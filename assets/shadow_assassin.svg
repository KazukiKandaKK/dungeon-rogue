<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <ellipse cx="24" cy="46" rx="9" ry="2.5" fill="rgba(0,0,0,0.3)"/>
  <!-- マント（後ろ） -->
  <path d="M12,20 Q8,28 10,40 Q16,34 24,36 Q32,34 38,40 Q40,28 36,20Z" fill="#0f0f14" stroke="#222" stroke-width="1"/>
  <!-- 足 -->
  <rect x="18" y="36" width="5" height="10" rx="2" fill="#1a1a22" stroke="#111" stroke-width="1"/>
  <rect x="25" y="36" width="5" height="10" rx="2" fill="#1a1a22" stroke="#111" stroke-width="1"/>
  <!-- 短刀（右） -->
  <line x1="34" y1="22" x2="44" y2="14" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M42,13 L46,12 L44,16Z" fill="#ccc" stroke="#888" stroke-width="0.8"/>
  <!-- 短刀（左） -->
  <line x1="14" y1="22" x2="4" y2="14" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M6,13 L2,12 L4,16Z" fill="#ccc" stroke="#888" stroke-width="0.8"/>
  <!-- 腕 -->
  <path d="M16,22 Q10,20 6,16" stroke="#1a1a22" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M32,22 Q38,20 42,16" stroke="#1a1a22" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- 胴体 -->
  <rect x="15" y="22" width="18" height="16" rx="3" fill="#1a1a22" stroke="#111" stroke-width="1.2"/>
  <!-- 胸の紋章 -->
  <path d="M20,26 L24,23 L28,26 L26,32 L22,32Z" fill="#2a2a3a" stroke="#333" stroke-width="0.8"/>
  <!-- 首 -->
  <rect x="20" y="17" width="8" height="6" rx="2" fill="#1a1a22" stroke="#111" stroke-width="1"/>
  <!-- フード付き頭 -->
  <ellipse cx="24" cy="13" rx="9" ry="8" fill="#0f0f14" stroke="#222" stroke-width="1.3"/>
  <!-- フードの影 -->
  <ellipse cx="24" cy="14" rx="7" ry="6" fill="#080810" opacity="0.8"/>
  <!-- 目（鋭い紫） -->
  <ellipse cx="19" cy="13" rx="3" ry="2" fill="#6600aa"/>
  <ellipse cx="29" cy="13" rx="3" ry="2" fill="#6600aa"/>
  <ellipse cx="19" cy="13" rx="1.5" ry="1" fill="#aa44ff"/>
  <ellipse cx="29" cy="13" rx="1.5" ry="1" fill="#aa44ff"/>
  <!-- マスク下半分 -->
  <rect x="16" y="16" width="16" height="4" rx="2" fill="#1a1a22" stroke="#111" stroke-width="0.8"/>
  <!-- 影の粒 -->
  <circle cx="6"  cy="22" r="1.2" fill="rgba(80,40,120,0.6)"/>
  <circle cx="42" cy="18" r="1"   fill="rgba(80,40,120,0.6)"/>
  <circle cx="10" cy="10" r="1"   fill="rgba(80,40,120,0.5)"/>
</svg>
