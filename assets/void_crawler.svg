  <path d="M24,20 Q24,12 22,6"  stroke="#3a0060" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M28,22 Q34,14 38,8"  stroke="#3a0060" stroke-width="2.5" fill="none" stroke-linecap="round"/>
