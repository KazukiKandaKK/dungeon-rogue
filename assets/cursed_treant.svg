<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 呪いの樹霊 — 呪われた森のボス -->
  <defs>
    <linearGradient id="ct_bark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#57534e"/>
      <stop offset="55%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <radialGradient id="ct_eye" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fde047"/>
      <stop offset="60%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </radialGradient>
    <radialGradient id="ct_miasma" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="rgba(74,222,128,0.6)"/>
      <stop offset="100%" stop-color="rgba(21,128,61,0)"/>
    </radialGradient>
  </defs>

  <!-- 瘴気 -->
  <circle cx="32" cy="36" r="30" fill="url(#ct_miasma)"/>

  <!-- 影 -->
  <ellipse cx="32" cy="60" rx="22" ry="2.5" fill="rgba(0,0,0,0.45)"/>

  <!-- 根（地中から広がる） -->
  <g fill="url(#ct_bark)" stroke="#0c0a09" stroke-width="0.6">
    <path d="M14,58 Q10,54 8,50 Q6,58 10,62 Q14,60 14,58 Z"/>
    <path d="M50,58 Q54,54 56,50 Q58,58 54,62 Q50,60 50,58 Z"/>
    <path d="M22,60 Q18,56 16,58 Q18,62 22,60 Z"/>
    <path d="M42,60 Q46,56 48,58 Q46,62 42,60 Z"/>
  </g>

  <!-- 幹（下部、太く） -->
  <path d="M20,54 Q18,40 22,28 L42,28 Q46,40 44,54 Q40,58 32,58 Q24,58 20,54 Z"
        fill="url(#ct_bark)" stroke="#0c0a09" stroke-width="1.1"/>
  <!-- 木目 -->
  <g stroke="#1c1917" stroke-width="0.5" fill="none" opacity="0.8">
    <path d="M22,36 Q26,40 24,46 Q28,50 26,56"/>
    <path d="M30,34 Q34,38 32,46 Q36,50 34,56"/>
    <path d="M38,36 Q42,40 40,46 Q44,50 42,56"/>
  </g>
  <!-- 苔 -->
  <g fill="#4d7c0f" opacity="0.7">
    <ellipse cx="22" cy="50" rx="2.5" ry="1.2"/>
    <ellipse cx="42" cy="48" rx="2.2" ry="1"/>
    <ellipse cx="28" cy="54" rx="1.8" ry="0.8"/>
  </g>

  <!-- 左腕（枝のような太い腕） -->
  <path d="M20,30 Q10,26 6,18 Q4,22 8,28 Q14,32 20,34 Z"
        fill="url(#ct_bark)" stroke="#0c0a09" stroke-width="0.9"/>
  <!-- 左手の指枝 -->
  <g stroke="#0c0a09" stroke-width="0.7" fill="url(#ct_bark)">
    <path d="M6,18 L2,12 L5,20 Z"/>
    <path d="M6,18 L10,12 L9,20 Z"/>
    <path d="M8,16 L14,10 L12,18 Z"/>
  </g>
  <!-- 右腕 -->
  <path d="M44,30 Q54,26 58,18 Q60,22 56,28 Q50,32 44,34 Z"
        fill="url(#ct_bark)" stroke="#0c0a09" stroke-width="0.9"/>
  <g stroke="#0c0a09" stroke-width="0.7" fill="url(#ct_bark)">
    <path d="M58,18 L62,12 L59,20 Z"/>
    <path d="M58,18 L54,12 L55,20 Z"/>
    <path d="M56,16 L50,10 L52,18 Z"/>
  </g>

  <!-- 頭部（幹の上部、樹冠は枯れ枝） -->
  <ellipse cx="32" cy="22" rx="14" ry="12" fill="url(#ct_bark)" stroke="#0c0a09" stroke-width="1.1"/>

  <!-- 枯れた枝（冠） -->
  <g stroke="#292524" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M22,10 Q20,4 18,2"/>
    <path d="M22,10 L24,4"/>
    <path d="M28,8 L30,2"/>
    <path d="M32,6 L32,0"/>
    <path d="M36,8 L38,2"/>
    <path d="M42,10 L44,4"/>
    <path d="M42,10 Q44,4 46,2"/>
  </g>
  <!-- 枝の実（呪いの赤果） -->
  <circle cx="20" cy="6" r="1.1" fill="#7f1d1d" stroke="#450a0a" stroke-width="0.3"/>
  <circle cx="38" cy="4" r="1.1" fill="#7f1d1d" stroke="#450a0a" stroke-width="0.3"/>
  <circle cx="46" cy="6" r="1.1" fill="#7f1d1d" stroke="#450a0a" stroke-width="0.3"/>

  <!-- 葉（数枚だけ、ぼろぼろ） -->
  <g fill="#166534" stroke="#14532d" stroke-width="0.4" opacity="0.85">
    <path d="M24,12 Q22,14 24,18 Q28,16 26,12 Z"/>
    <path d="M38,12 Q40,14 38,18 Q34,16 36,12 Z"/>
  </g>

  <!-- 目（洞） -->
  <g>
    <ellipse cx="26" cy="22" rx="3" ry="3.5" fill="#0c0a09"/>
    <ellipse cx="38" cy="22" rx="3" ry="3.5" fill="#0c0a09"/>
    <circle cx="26" cy="22" r="1.6" fill="url(#ct_eye)"/>
    <circle cx="38" cy="22" r="1.6" fill="url(#ct_eye)"/>
    <circle cx="26" cy="22" r="0.6" fill="#fff"/>
    <circle cx="38" cy="22" r="0.6" fill="#fff"/>
  </g>

  <!-- 口（樹皮の裂け目に並ぶ牙） -->
  <path d="M22,30 Q32,36 42,30 Q38,34 32,34 Q26,34 22,30 Z" fill="#0c0a09" stroke="#1c1917" stroke-width="0.4"/>
  <g fill="#f5f5f4">
    <path d="M26,30 L27,34 L28,30 Z"/>
    <path d="M30,30 L31,34.5 L32,30 Z"/>
    <path d="M34,30 L35,34.5 L36,30 Z"/>
    <path d="M38,30 L37,33 L36,30 Z" transform="translate(2 0)"/>
  </g>

  <!-- 胸の呪印（ルーン） -->
  <g stroke="#dc2626" stroke-width="0.8" fill="none" opacity="0.9">
    <circle cx="32" cy="44" r="4"/>
    <path d="M28,44 L36,44 M32,40 L32,48 M29,41 L35,47 M35,41 L29,47"/>
  </g>

  <!-- 舞い散る葉・呪いの光点 -->
  <g fill="#4ade80" opacity="0.8">
    <circle cx="10" cy="40" r="0.8"/>
    <circle cx="54" cy="44" r="0.8"/>
    <circle cx="16" cy="22" r="0.6"/>
    <circle cx="50" cy="22" r="0.6"/>
  </g>
  <g fill="#dc2626" opacity="0.8">
    <circle cx="8" cy="32" r="0.6"/>
    <circle cx="58" cy="38" r="0.6"/>
  </g>
</svg>
