<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Shadow -->
  <ellipse cx="24" cy="45" rx="12" ry="2.5" fill="rgba(0,0,0,0.4)"/>

  <!-- Body (stocky coat) -->
  <rect x="12" y="22" width="24" height="20" rx="4" fill="#1c1c1c"/>
  <!-- Coat lapels -->
  <polygon points="24,22 16,28 18,22" fill="#2a2a2a"/>
  <polygon points="24,22 32,28 30,22" fill="#2a2a2a"/>
  <!-- Shirt/tie hint -->
  <rect x="21" y="22" width="6" height="10" rx="1" fill="#2a2a2a"/>
  <polygon points="24,24 22,32 24,31 26,32" fill="#7f1d1d"/>

  <!-- Arms -->
  <rect x="4"  y="23" width="10" height="7" rx="3" fill="#1c1c1c"/>
  <rect x="34" y="23" width="10" height="7" rx="3" fill="#1c1c1c"/>

  <!-- Club (right hand) -->
  <rect x="38" y="16" width="5" height="16" rx="2.5" fill="#78350f"/>
  <ellipse cx="40.5" cy="15" rx="4" ry="3" fill="#92400e"/>
  <!-- Metal band on club -->
  <rect x="38" y="22" width="5" height="2" rx="1" fill="#94a3b8"/>

  <!-- Fist left -->
  <ellipse cx="9" cy="31" rx="4" ry="3.5" fill="#c2845a"/>

  <!-- Neck -->
  <rect x="20" y="17" width="8" height="7" rx="2" fill="#c2845a"/>

  <!-- Head -->
  <ellipse cx="24" cy="14" rx="10" ry="9" fill="#c2845a"/>
  <!-- Head shadow -->
  <ellipse cx="24" cy="17" rx="9" ry="5" fill="#b0724a" opacity="0.4"/>

  <!-- Hair (buzz cut / shaved) -->
  <ellipse cx="24" cy="8" rx="9.5" ry="5" fill="#2a1a0a"/>

  <!-- Eyes (threatening) -->
  <ellipse cx="20" cy="14" rx="2.5" ry="2" fill="white"/>
  <ellipse cx="28" cy="14" rx="2.5" ry="2" fill="white"/>
  <circle cx="20.5" cy="14" r="1.5" fill="#1a0000"/>
  <circle cx="28.5" cy="14" r="1.5" fill="#1a0000"/>
  <circle cx="21" cy="13.5" r="0.5" fill="white"/>
  <circle cx="29" cy="13.5" r="0.5" fill="white"/>
  <!-- Angry brows -->
  <line x1="17.5" y1="11.5" x2="22.5" y2="12.5" stroke="#2a1a0a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25.5" y1="12.5" x2="30.5" y2="11.5" stroke="#2a1a0a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="24" cy="17" rx="1.8" ry="1.2" fill="#b0724a"/>

  <!-- Grimace mouth -->
  <path d="M20,20 Q24,18.5 28,20" stroke="#7f3a1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Scar -->
  <line x1="26" y1="13" x2="28" y2="17" stroke="#a05030" stroke-width="0.8" opacity="0.7"/>

  <!-- Gold coin bag on belt -->
  <ellipse cx="18" cy="38" rx="4" ry="3.5" fill="#b45309"/>
  <ellipse cx="18" cy="36" rx="3" ry="2" fill="#d97706"/>
  <text x="18" y="39" font-size="4" text-anchor="middle" fill="#fbbf24" font-weight="bold">¥</text>

  <!-- Boots -->
  <rect x="13" y="39" width="8" height="5" rx="2" fill="#111"/>
  <rect x="27" y="39" width="8" height="5" rx="2" fill="#111"/>
</svg>
