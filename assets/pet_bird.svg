<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="bd_head" cx="50%" cy="35%" r="70%">
      <stop offset="0%"  stop-color="#a8d8ff"/>
      <stop offset="55%" stop-color="#3a8ae0"/>
      <stop offset="100%" stop-color="#0a3a80"/>
    </radialGradient>
    <radialGradient id="bd_belly" cx="50%" cy="40%" r="70%">
      <stop offset="0%"  stop-color="#fff4b0"/>
      <stop offset="60%" stop-color="#f5c838"/>
      <stop offset="100%" stop-color="#a07810"/>
    </radialGradient>
    <linearGradient id="bd_beak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffc060"/>
      <stop offset="100%" stop-color="#d06818"/>
    </linearGradient>
    <linearGradient id="bd_tail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a8ae0"/>
      <stop offset="100%" stop-color="#0a2a60"/>
    </linearGradient>
  </defs>

  <!-- 影 -->
  <ellipse cx="24" cy="45" rx="14" ry="3" fill="rgba(0,0,0,0.30)"/>

  <!-- 止まり木 -->
  <rect x="10" y="41" width="28" height="2.2" rx="1" fill="#8a5a28" stroke="#4a2e10" stroke-width="0.5"/>

  <!-- 足 -->
  <line x1="21" y1="38" x2="21" y2="41" stroke="#c07830" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="27" y1="38" x2="27" y2="41" stroke="#c07830" stroke-width="1.2" stroke-linecap="round"/>

  <!-- しっぽ羽 -->
  <path d="M32,34 L42,38 L34,38 Z" fill="url(#bd_tail)" stroke="#0a2a60" stroke-width="0.7"/>
  <path d="M32,35 L40,40 L33,39 Z" fill="#2a6ac0" stroke="#0a2a60" stroke-width="0.5"/>

  <!-- 体（黄色いお腹） -->
  <ellipse cx="24" cy="30" rx="10" ry="9" fill="url(#bd_belly)" stroke="#7a5810" stroke-width="0.9"/>

  <!-- 翼 -->
  <path d="M15,28 Q14,34 20,38 Q22,34 20,28 Z" fill="url(#bd_head)" stroke="#0a3a80" stroke-width="0.7"/>
  <!-- 羽の筋 -->
  <path d="M17,30 Q17,34 19,37" stroke="#0a2a60" stroke-width="0.4" fill="none" opacity="0.6"/>

  <!-- 頭（青） -->
  <circle cx="24" cy="18" r="9" fill="url(#bd_head)" stroke="#0a3a80" stroke-width="1"/>

  <!-- 頭とお腹の境目 -->
  <path d="M16,24 Q24,28 32,24" stroke="#0a3a80" stroke-width="0.6" fill="none" opacity="0.5"/>

  <!-- くちばし -->
  <path d="M24,20 L30,21.5 L24,23 Z" fill="url(#bd_beak)" stroke="#7a3808" stroke-width="0.6"/>
  <line x1="24" y1="21.7" x2="29" y2="21.7" stroke="#7a3808" stroke-width="0.4"/>

  <!-- 目（ドット） -->
  <circle cx="22" cy="17" r="1.8" fill="#ffffff"/>
  <circle cx="22" cy="17" r="1.3" fill="#0a0408"/>
  <circle cx="22.4" cy="16.6" r="0.5" fill="#ffffff"/>

  <!-- ハイライト -->
  <ellipse cx="21" cy="12" rx="3" ry="1.4" fill="rgba(255,255,255,0.45)"/>
  <ellipse cx="20" cy="33" rx="2.5" ry="1" fill="rgba(255,255,255,0.35)"/>

  <!-- 頬 -->
  <ellipse cx="17" cy="20" rx="1.5" ry="1" fill="#ffa0b0" opacity="0.5"/>
</svg>
