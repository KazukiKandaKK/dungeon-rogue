<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="rb_body" cx="45%" cy="40%" r="70%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#eae4dc"/>
      <stop offset="100%" stop-color="#a89c8c"/>
    </radialGradient>
    <radialGradient id="rb_face" cx="50%" cy="45%" r="60%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="80%" stop-color="#f0ebe2"/>
      <stop offset="100%" stop-color="#b0a494"/>
    </radialGradient>
    <linearGradient id="rb_earin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffc8d8"/>
      <stop offset="100%" stop-color="#e68098"/>
    </linearGradient>
  </defs>

  <!-- 影 -->
  <ellipse cx="24" cy="45" rx="14" ry="3" fill="rgba(0,0,0,0.30)"/>

  <!-- 耳（左、長く立った） -->
  <ellipse cx="18" cy="10" rx="2.6" ry="7" fill="url(#rb_body)" stroke="#8a7e6e" stroke-width="0.8"/>
  <ellipse cx="18" cy="10.5" rx="1.3" ry="5.5" fill="url(#rb_earin)"/>
  <!-- 耳（右） -->
  <ellipse cx="30" cy="10" rx="2.6" ry="7" fill="url(#rb_body)" stroke="#8a7e6e" stroke-width="0.8"/>
  <ellipse cx="30" cy="10.5" rx="1.3" ry="5.5" fill="url(#rb_earin)"/>

  <!-- しっぽのちょこっと見え -->
  <circle cx="37" cy="36" r="2.5" fill="#ffffff" stroke="#8a7e6e" stroke-width="0.6"/>

  <!-- 体（丸くふわふわ） -->
  <ellipse cx="24" cy="34" rx="11" ry="9" fill="url(#rb_body)" stroke="#8a7e6e" stroke-width="1"/>

  <!-- 足 -->
  <ellipse cx="16" cy="42" rx="3" ry="2" fill="#f2ecdf" stroke="#8a7e6e" stroke-width="0.6"/>
  <ellipse cx="32" cy="42" rx="3" ry="2" fill="#f2ecdf" stroke="#8a7e6e" stroke-width="0.6"/>

  <!-- 頭 -->
  <circle cx="24" cy="22" r="10" fill="url(#rb_face)" stroke="#8a7e6e" stroke-width="1"/>

  <!-- 鼻 -->
  <path d="M23,24 L25,24 L24,25.2 Z" fill="#e08098" stroke="#a04060" stroke-width="0.4"/>

  <!-- 口 -->
  <line x1="24" y1="25.2" x2="24" y2="26.5" stroke="#8a4060" stroke-width="0.5"/>
  <path d="M24,26.5 Q22.5,27.5 21.5,26.8" stroke="#5a2038" stroke-width="0.6" fill="none"/>
  <path d="M24,26.5 Q25.5,27.5 26.5,26.8" stroke="#5a2038" stroke-width="0.6" fill="none"/>

  <!-- 前歯 -->
  <rect x="23" y="27" width="2" height="2" fill="#ffffff" stroke="#8a7e6e" stroke-width="0.3"/>
  <line x1="24" y1="27" x2="24" y2="29" stroke="#b0a494" stroke-width="0.3"/>

  <!-- ひげ -->
  <line x1="19" y1="25" x2="12" y2="24.5" stroke="#8a7e6e" stroke-width="0.35"/>
  <line x1="19" y1="26" x2="12" y2="26.5" stroke="#8a7e6e" stroke-width="0.35"/>
  <line x1="29" y1="25" x2="36" y2="24.5" stroke="#8a7e6e" stroke-width="0.35"/>
  <line x1="29" y1="26" x2="36" y2="26.5" stroke="#8a7e6e" stroke-width="0.35"/>

  <!-- 目 -->
  <ellipse cx="19" cy="21" rx="2.2" ry="2.6" fill="#1a0a10"/>
  <ellipse cx="29" cy="21" rx="2.2" ry="2.6" fill="#1a0a10"/>
  <ellipse cx="19.7" cy="20" rx="0.8" ry="1" fill="#ffffff"/>
  <ellipse cx="29.7" cy="20" rx="0.8" ry="1" fill="#ffffff"/>
  <circle cx="18.5" cy="22" r="0.35" fill="rgba(255,255,255,0.6)"/>
  <circle cx="28.5" cy="22" r="0.35" fill="rgba(255,255,255,0.6)"/>

  <!-- 頬 -->
  <ellipse cx="15" cy="24" rx="1.8" ry="1.2" fill="#ffb8c8" opacity="0.55"/>
  <ellipse cx="33" cy="24" rx="1.8" ry="1.2" fill="#ffb8c8" opacity="0.55"/>

  <!-- ハイライト -->
  <ellipse cx="20" cy="16" rx="3" ry="1.4" fill="rgba(255,255,255,0.6)"/>
</svg>
