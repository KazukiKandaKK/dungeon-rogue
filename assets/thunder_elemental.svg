  <path d="M4,16 Q2,12 0,14"   stroke="#ffee00" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M4,16 Q0,18 2,22"   stroke="#ffee00" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- 放電（右） -->
  <path d="M30,18 Q38,14 44,16" stroke="#ffee00" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M44,16 Q46,12 48,14" stroke="#ffee00" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M44,16 Q48,18 46,22" stroke="#ffee00" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- コア -->
  <ellipse cx="24" cy="22" rx="5" ry="6" fill="#ffdd00" opacity="0.7"/>
  <ellipse cx="24" cy="22" rx="2.5" ry="3" fill="white" opacity="0.6"/>
  <!-- 目（白く光る） -->
  <ellipse cx="20" cy="20" rx="2.5" ry="2.5" fill="#aa6600"/>
  <ellipse cx="28" cy="20" rx="2.5" ry="2.5" fill="#aa6600"/>
  <ellipse cx="20" cy="19.5" rx="1.4" ry="1.4" fill="white"/>
  <ellipse cx="28" cy="19.5" rx="1.4" ry="1.4" fill="white"/>
  <!-- 火花 -->
  <circle cx="6"  cy="10" r="1.5" fill="#ffee00" opacity="0.8"/>
  <circle cx="42" cy="8"  r="1.2" fill="#ffee00" opacity="0.7"/>
  <circle cx="4"  cy="28" r="1"   fill="#ffcc00" opacity="0.6"/>
  <circle cx="44" cy="30" r="1.3" fill="#ffee00" opacity="0.7"/>
