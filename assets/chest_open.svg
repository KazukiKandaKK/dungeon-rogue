<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Shadow -->
  <ellipse cx="24" cy="44" rx="16" ry="3" fill="rgba(0,0,0,0.35)"/>

  <!-- Golden glow inside -->
  <ellipse cx="24" cy="28" rx="13" ry="5" fill="#ffd700" opacity="0.35"/>
  <ellipse cx="24" cy="28" rx="9"  ry="3" fill="#ffe060" opacity="0.4"/>

  <!-- Body (bottom half) -->
  <rect x="6" y="26" width="36" height="16" rx="3" fill="#7c4a1a"/>
  <!-- Wood planks (bottom) -->
  <line x1="6" y1="30" x2="42" y2="30" stroke="#5a3010" stroke-width="0.8" opacity="0.5"/>
  <line x1="6" y1="34" x2="42" y2="34" stroke="#5a3010" stroke-width="0.8" opacity="0.5"/>
  <line x1="6" y1="38" x2="42" y2="38" stroke="#5a3010" stroke-width="0.8" opacity="0.5"/>

  <!-- Gold contents shine -->
  <ellipse cx="24" cy="27" rx="11" ry="4" fill="#f0b800" opacity="0.7"/>
  <ellipse cx="22" cy="26" rx="5"  ry="2" fill="#ffe080" opacity="0.5"/>

  <!-- Lid (open - leaned back) -->
  <rect x="6" y="8" width="36" height="12" rx="3" fill="#a0602a" transform="rotate(-15 24 26)"/>
  <rect x="6" y="8" width="36" height="5"  rx="3" fill="rgba(255,200,120,0.18)" transform="rotate(-15 24 26)"/>
  <line x1="6" y1="12" x2="42" y2="12" stroke="#7a4810" stroke-width="0.8" opacity="0.5" transform="rotate(-15 24 26)"/>
  <line x1="6" y1="16" x2="42" y2="16" stroke="#7a4810" stroke-width="0.8" opacity="0.5" transform="rotate(-15 24 26)"/>

  <!-- Gold trim - bottom frame -->
  <rect x="5" y="25" width="38" height="3" rx="1.5" fill="#e8b820"/>
  <rect x="5" y="39" width="38" height="3" rx="1.5" fill="#d4a017"/>
  <rect x="5" y="25" width="3" height="17" rx="1.5" fill="#d4a017"/>
  <rect x="40" y="25" width="3" height="17" rx="1.5" fill="#d4a017"/>

  <!-- Gold trim - lid frame (rotated with lid) -->
  <rect x="5" y="7" width="38" height="3" rx="1.5" fill="#e8b820" transform="rotate(-15 24 26)"/>
  <rect x="5" y="19" width="38" height="3" rx="1.5" fill="#e8b820" transform="rotate(-15 24 26)"/>
  <rect x="5" y="7"  width="3" height="15" rx="1.5" fill="#e8b820" transform="rotate(-15 24 26)"/>
  <rect x="40" y="7" width="3" height="15" rx="1.5" fill="#e8b820" transform="rotate(-15 24 26)"/>

  <!-- Corner rivets (body) -->
  <circle cx="9"  cy="37" r="2" fill="#f0c030"/>
  <circle cx="39" cy="37" r="2" fill="#f0c030"/>
  <circle cx="9"  cy="37" r="1" fill="#ffe070"/>
  <circle cx="39" cy="37" r="1" fill="#ffe070"/>

  <!-- Interior gold coins hint -->
  <circle cx="20" cy="27" r="2" fill="#ffd700" opacity="0.9"/>
  <circle cx="24" cy="26" r="2.5" fill="#ffd700" opacity="0.8"/>
  <circle cx="28" cy="27" r="2" fill="#ffd700" opacity="0.9"/>
  <circle cx="16" cy="28" r="1.5" fill="#f0c030" opacity="0.7"/>
  <circle cx="32" cy="28" r="1.5" fill="#f0c030" opacity="0.7"/>

  <!-- Sparkle burst from open chest -->
  <line x1="24" y1="22" x2="24" y2="15" stroke="#ffe060" stroke-width="1.5" opacity="0.9"/>
  <line x1="20" y1="23" x2="16" y2="17" stroke="#ffd700" stroke-width="1.2" opacity="0.8"/>
  <line x1="28" y1="23" x2="32" y2="17" stroke="#ffd700" stroke-width="1.2" opacity="0.8"/>
  <line x1="18" y1="22" x2="12" y2="19" stroke="#ffe060" stroke-width="1.0" opacity="0.7"/>
  <line x1="30" y1="22" x2="36" y2="19" stroke="#ffe060" stroke-width="1.0" opacity="0.7"/>

  <circle cx="24" cy="14" r="2"   fill="#ffe060" opacity="0.95"/>
  <circle cx="16" cy="16" r="1.5" fill="#ffd700" opacity="0.85"/>
  <circle cx="32" cy="16" r="1.5" fill="#ffd700" opacity="0.85"/>
  <circle cx="12" cy="18" r="1"   fill="#ffe060" opacity="0.7"/>
  <circle cx="36" cy="18" r="1"   fill="#ffe060" opacity="0.7"/>
</svg>
