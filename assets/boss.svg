<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ── ボス：暗黒騎士（ディスガイア風SD大型） ── -->

  <!-- マント（大きく広がる・暗紫） -->
  <path d="M10,38 Q2,50 5,62 L12,60 Q8,50 12,40Z" fill="#3b0070" stroke="#1a0040" stroke-width="1"/>
  <path d="M54,38 Q62,50 59,62 L52,60 Q56,50 52,40Z" fill="#3b0070" stroke="#1a0040" stroke-width="1"/>
  <path d="M16,36 Q8,44 10,58 L18,55 Q14,46 17,38Z" fill="#4a0088" stroke="#1a0040" stroke-width="0.8"/>
  <path d="M48,36 Q56,44 54,58 L46,55 Q50,46 47,38Z" fill="#4a0088" stroke="#1a0040" stroke-width="0.8"/>

  <!-- 足・重鎧ブーツ -->
  <rect x="20" y="50" width="10" height="13" rx="2" fill="#1a0a2e" stroke="#0a0018" stroke-width="1.2"/>
  <rect x="34" y="50" width="10" height="13" rx="2" fill="#1a0a2e" stroke="#0a0018" stroke-width="1.2"/>
  <!-- ブーツの金属装飾 -->
  <rect x="20" y="57" width="10" height="4" rx="1.5" fill="#5a3888" stroke="#3a1868" stroke-width="0.8"/>
  <rect x="34" y="57" width="10" height="4" rx="1.5" fill="#5a3888" stroke="#3a1868" stroke-width="0.8"/>

  <!-- 胴体・暗黒鎧 -->
  <rect x="16" y="34" width="32" height="20" rx="4" fill="#1e0a38" stroke="#4a1888" stroke-width="1.5"/>
  <!-- 胸プレート -->
  <rect x="20" y="36" width="24" height="14" rx="2.5" fill="#2a1050" stroke="#5a28a0" stroke-width="1"/>
  <!-- 中央ルーン文様 -->
  <path d="M32,38 L33.5,42 L36,42 L34,44 L35,47 L32,45 L29,47 L30,44 L28,42 L30.5,42Z"
        fill="#8b00ff" stroke="#6000cc" stroke-width="0.5" opacity="0.9"/>
  <!-- 胸プレート縁の光） -->
  <rect x="20" y="36" width="24" height="2" rx="1" fill="rgba(180,80,255,0.4)"/>
  <!-- 肩ガード（大） -->
  <rect x="8"  y="33" width="11" height="9" rx="3" fill="#2a1050" stroke="#5a28a0" stroke-width="1.2"/>
  <rect x="45" y="33" width="11" height="9" rx="3" fill="#2a1050" stroke="#5a28a0" stroke-width="1.2"/>
  <!-- 肩スパイク -->
  <path d="M10,33 L8,26 L13,32Z"  fill="#6a20c0" stroke="#4a10a0" stroke-width="0.8"/>
  <path d="M54,33 L56,26 L51,32Z" fill="#6a20c0" stroke="#4a10a0" stroke-width="0.8"/>

  <!-- 大剣（左側） -->
  <rect x="4"  y="10" width="5" height="34" rx="2" fill="#5a4888" stroke="#3a2868" stroke-width="1"/>
  <!-- 刀身の光 -->
  <rect x="5.5" y="12" width="2" height="30" rx="1" fill="rgba(180,80,255,0.5)"/>
  <!-- 鍔 -->
  <rect x="1"  y="26" width="11" height="4" rx="2" fill="#7a58a8" stroke="#5a38a8" stroke-width="1"/>
  <circle cx="6.5" cy="10" r="3" fill="#aa60ff" stroke="#8800cc" stroke-width="1"/>

  <!-- 頭（兜） -->
  <!-- 兜ベース -->
  <path d="M15,24 Q14,10 32,8 Q50,10 49,24 L48,28 L16,28Z"
        fill="#1e0a38" stroke="#5a28a0" stroke-width="1.5"/>
  <!-- 兜の羽（左右） -->
  <path d="M15,20 Q8,16 6,10 Q10,12 14,18Z"  fill="#6a20c0" stroke="#4a10a0" stroke-width="0.8"/>
  <path d="M49,20 Q56,16 58,10 Q54,12 50,18Z" fill="#6a20c0" stroke="#4a10a0" stroke-width="0.8"/>
  <!-- 兜の縁ライン -->
  <path d="M16,28 Q32,26 48,28" stroke="#8844cc" stroke-width="1" fill="none"/>

  <!-- 顔（暗い・目だけ光る） -->
  <ellipse cx="32" cy="20" rx="13" ry="13" fill="#0e0520"/>
  <!-- 目（赤く光る・悪魔の目） -->
  <ellipse cx="25" cy="20" rx="5"  ry="4"  fill="#1a0000" stroke="#330000" stroke-width="0.5"/>
  <ellipse cx="39" cy="20" rx="5"  ry="4"  fill="#1a0000" stroke="#330000" stroke-width="0.5"/>
  <!-- 赤い光る虹彩 -->
  <ellipse cx="25" cy="20" rx="3.5" ry="3" fill="#cc0000"/>
  <ellipse cx="39" cy="20" rx="3.5" ry="3" fill="#cc0000"/>
  <!-- 炎の瞳 -->
  <ellipse cx="25" cy="20" rx="2"   ry="2" fill="#ff4400"/>
  <ellipse cx="39" cy="20" rx="2"   ry="2" fill="#ff4400"/>
  <!-- 瞳の輝き -->
  <ellipse cx="26" cy="18.5" rx="1.2" ry="1" fill="rgba(255,180,100,0.9)"/>
  <ellipse cx="40" cy="18.5" rx="1.2" ry="1" fill="rgba(255,180,100,0.9)"/>
  <!-- 眉（凶悪な角度） -->
  <path d="M20,16 Q25,13.5 30,16" stroke="#660000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M34,16 Q39,13.5 44,16" stroke="#660000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 口（裂けた口） -->
  <path d="M24,25 Q32,28 40,25" stroke="#440000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 牙 -->
  <path d="M26,25 L25,29 L28,26Z"  fill="#e0e0e0" stroke="#808080" stroke-width="0.5"/>
  <path d="M38,25 L39,29 L36,26Z"  fill="#e0e0e0" stroke="#808080" stroke-width="0.5"/>
  <path d="M31,25.5 L30,28 L32,26.5Z" fill="#e0e0e0" stroke="#808080" stroke-width="0.4"/>
  <path d="M33,25.5 L34,28 L32,26.5Z" fill="#e0e0e0" stroke="#808080" stroke-width="0.4"/>

  <!-- 兜の前面装飾（クロス） -->
  <line x1="32" y1="9" x2="32" y2="16" stroke="#8844cc" stroke-width="1.5"/>
  <line x1="28" y1="12" x2="36" y2="12" stroke="#8844cc" stroke-width="1.5"/>

  <!-- 魔力オーラ（外縁） -->
  <ellipse cx="32" cy="36" rx="26" ry="20" fill="none" stroke="rgba(138,0,255,0.25)" stroke-width="3"/>
  <ellipse cx="32" cy="36" rx="30" ry="24" fill="none" stroke="rgba(138,0,255,0.12)" stroke-width="4"/>
</svg>
