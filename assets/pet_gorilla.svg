<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="go_body" cx="45%" cy="35%" r="70%">
      <stop offset="0%"  stop-color="#6a6a70"/>
      <stop offset="55%" stop-color="#3a3a42"/>
      <stop offset="100%" stop-color="#101014"/>
    </radialGradient>
    <radialGradient id="go_face" cx="50%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#c8c8cc"/>
      <stop offset="70%" stop-color="#8a8a92"/>
      <stop offset="100%" stop-color="#4a4a54"/>
    </radialGradient>
    <linearGradient id="go_chest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#a8a8b0"/>
      <stop offset="100%" stop-color="#606068"/>
    </linearGradient>
  </defs>

  <!-- 影 -->
  <ellipse cx="24" cy="45" rx="14" ry="3" fill="rgba(0,0,0,0.30)"/>

  <!-- 体（広い肩） -->
  <path d="M8,40 Q6,28 14,22 Q24,18 34,22 Q42,28 40,40 Q36,44 24,44 Q12,44 8,40 Z"
        fill="url(#go_body)" stroke="#0a0a10" stroke-width="1"/>

  <!-- 腕（左右、大きく） -->
  <ellipse cx="10" cy="34" rx="4" ry="7" fill="url(#go_body)" stroke="#0a0a10" stroke-width="0.8"/>
  <ellipse cx="38" cy="34" rx="4" ry="7" fill="url(#go_body)" stroke="#0a0a10" stroke-width="0.8"/>
  <!-- こぶし -->
  <circle cx="10" cy="41" r="3" fill="#50505a" stroke="#0a0a10" stroke-width="0.7"/>
  <circle cx="38" cy="41" r="3" fill="#50505a" stroke="#0a0a10" stroke-width="0.7"/>

  <!-- 胸パッチ -->
  <ellipse cx="24" cy="34" rx="7" ry="5" fill="url(#go_chest)" opacity="0.7"/>

  <!-- 頭 -->
  <ellipse cx="24" cy="18" rx="10" ry="9.5" fill="url(#go_body)" stroke="#0a0a10" stroke-width="1"/>

  <!-- 顔（ライトグレー） -->
  <ellipse cx="24" cy="20" rx="7" ry="7" fill="url(#go_face)" stroke="#3a3a42" stroke-width="0.6"/>

  <!-- 眉のブロウリッジ -->
  <path d="M17,17 Q24,14 31,17" stroke="#2a2a32" stroke-width="1.2" fill="none"/>

  <!-- 目（小さめ） -->
  <ellipse cx="20.5" cy="19.5" rx="1.2" ry="1.4" fill="#0a0804"/>
  <ellipse cx="27.5" cy="19.5" rx="1.2" ry="1.4" fill="#0a0804"/>
  <circle cx="20.8" cy="19" r="0.35" fill="#ffffff"/>
  <circle cx="27.8" cy="19" r="0.35" fill="#ffffff"/>

  <!-- 鼻 -->
  <ellipse cx="24" cy="22.5" rx="2.2" ry="1.3" fill="#3a2820" stroke="#1a100a" stroke-width="0.4"/>
  <ellipse cx="23" cy="22.5" rx="0.5" ry="0.6" fill="#100808"/>
  <ellipse cx="25" cy="22.5" rx="0.5" ry="0.6" fill="#100808"/>

  <!-- 口 -->
  <path d="M21,25 Q24,26.5 27,25" stroke="#2a1810" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- 耳（側面の小さい円） -->
  <ellipse cx="14" cy="18" rx="1.5" ry="2" fill="#2a2a32" stroke="#0a0a10" stroke-width="0.5"/>
  <ellipse cx="34" cy="18" rx="1.5" ry="2" fill="#2a2a32" stroke="#0a0a10" stroke-width="0.5"/>

  <!-- ハイライト -->
  <ellipse cx="20" cy="12" rx="3" ry="1.2" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="18" cy="30" rx="2" ry="1" fill="rgba(255,255,255,0.15)"/>
</svg>
