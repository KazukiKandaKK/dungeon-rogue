<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="dg_body" cx="45%" cy="35%" r="70%">
      <stop offset="0%"  stop-color="#ffe3a8"/>
      <stop offset="55%" stop-color="#d89a4a"/>
      <stop offset="100%" stop-color="#7a4a10"/>
    </radialGradient>
    <radialGradient id="dg_face" cx="50%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#ffebc0"/>
      <stop offset="70%" stop-color="#e8ad5a"/>
      <stop offset="100%" stop-color="#955a18"/>
    </radialGradient>
    <linearGradient id="dg_ear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#b67a28"/>
      <stop offset="100%" stop-color="#6a3a08"/>
    </linearGradient>
    <linearGradient id="dg_tongue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ff9ab0"/>
      <stop offset="100%" stop-color="#d85070"/>
    </linearGradient>
  </defs>

  <!-- 影 -->
  <ellipse cx="24" cy="45" rx="14" ry="3" fill="rgba(0,0,0,0.30)"/>

  <!-- しっぽ（後ろで振る） -->
  <path d="M38,30 Q44,24 42,18 Q40,17 38,20 Q37,26 36,30 Z"
        fill="url(#dg_body)" stroke="#6a3a08" stroke-width="0.8"/>

  <!-- 体 -->
  <ellipse cx="24" cy="36" rx="12" ry="8" fill="url(#dg_body)" stroke="#6a3a08" stroke-width="1"/>

  <!-- 足 -->
  <ellipse cx="18" cy="42" rx="3" ry="2.2" fill="#b67a28" stroke="#5a2e08" stroke-width="0.6"/>
  <ellipse cx="30" cy="42" rx="3" ry="2.2" fill="#b67a28" stroke="#5a2e08" stroke-width="0.6"/>

  <!-- 耳（左、垂れ耳） -->
  <path d="M9,18 Q7,26 11,30 Q15,28 14,22 Q13,18 9,18 Z"
        fill="url(#dg_ear)" stroke="#4a2400" stroke-width="0.8"/>
  <!-- 耳（右、垂れ耳） -->
  <path d="M39,18 Q41,26 37,30 Q33,28 34,22 Q35,18 39,18 Z"
        fill="url(#dg_ear)" stroke="#4a2400" stroke-width="0.8"/>

  <!-- 頭 -->
  <circle cx="24" cy="22" r="11" fill="url(#dg_face)" stroke="#6a3a08" stroke-width="1"/>

  <!-- マズル -->
  <ellipse cx="24" cy="27" rx="5" ry="3.5" fill="#fbe0b0" stroke="#8a5a1c" stroke-width="0.6"/>

  <!-- 舌 -->
  <path d="M22,28.5 Q24,34 26,28.5 Z" fill="url(#dg_tongue)" stroke="#a03050" stroke-width="0.5"/>
  <line x1="24" y1="29" x2="24" y2="32.5" stroke="#a03050" stroke-width="0.4"/>

  <!-- 鼻 -->
  <ellipse cx="24" cy="25.5" rx="1.6" ry="1.2" fill="#2a1808"/>
  <ellipse cx="23.5" cy="25.1" rx="0.5" ry="0.4" fill="#ffffff" opacity="0.7"/>

  <!-- 目 -->
  <ellipse cx="19" cy="21" rx="2.2" ry="2.6" fill="#1a0a00"/>
  <ellipse cx="29" cy="21" rx="2.2" ry="2.6" fill="#1a0a00"/>
  <!-- ハイライト -->
  <ellipse cx="19.7" cy="20" rx="0.8" ry="1" fill="#ffffff"/>
  <ellipse cx="29.7" cy="20" rx="0.8" ry="1" fill="#ffffff"/>
  <circle cx="18.5" cy="22" r="0.35" fill="rgba(255,255,255,0.6)"/>
  <circle cx="28.5" cy="22" r="0.35" fill="rgba(255,255,255,0.6)"/>

  <!-- 頬 -->
  <ellipse cx="14.5" cy="24" rx="1.8" ry="1.2" fill="#ffb8a0" opacity="0.5"/>
  <ellipse cx="33.5" cy="24" rx="1.8" ry="1.2" fill="#ffb8a0" opacity="0.5"/>

  <!-- ハイライト（頭） -->
  <ellipse cx="20" cy="15" rx="3" ry="1.5" fill="rgba(255,255,255,0.35)"/>
</svg>
