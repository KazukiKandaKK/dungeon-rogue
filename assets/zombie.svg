  <path d="M32,24 Q40,22 43,18" stroke="#4a6a20" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- 指（左） -->
  <line x1="5" y1="22" x2="2" y2="18" stroke="#3a5a10" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="22" x2="2" y2="22" stroke="#3a5a10" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="22" x2="3" y2="26" stroke="#3a5a10" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 指（右） -->
  <line x1="43" y1="18" x2="46" y2="14" stroke="#3a5a10" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="18" x2="46" y2="18" stroke="#3a5a10" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="18" x2="45" y2="22" stroke="#3a5a10" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 胴体 -->
  <rect x="16" y="22" width="16" height="18" rx="3" fill="#5a7a28" stroke="#2a4a10" stroke-width="1.2"/>
