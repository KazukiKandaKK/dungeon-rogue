  <path d="M20,26 Q22,28 20,32" stroke="#3a5a10" stroke-width="1.2" fill="none"/>
  <path d="M26,28 L28,34" stroke="#3a5a10" stroke-width="1.2"/>
  <!-- 首 -->
  <rect x="21" y="17" width="6" height="6" rx="1" fill="#5a7a28" stroke="#2a4a10" stroke-width="1"/>
  <!-- 頭 -->
  <ellipse cx="24" cy="12" rx="9" ry="8" fill="#607a2e" stroke="#2a4a10" stroke-width="1.4"/>
  <!-- 腐った肌の質感 -->
  <ellipse cx="18" cy="10" rx="3" ry="2" fill="#4a6a20" opacity="0.5"/>
  <ellipse cx="30" cy="13" rx="2.5" ry="2" fill="#4a6a20" opacity="0.5"/>
