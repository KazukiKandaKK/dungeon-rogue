<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <ellipse cx="24" cy="46" rx="14" ry="3.5" fill="rgba(0,0,0,0.3)"/>
  <!-- 足 -->
  <rect x="13" y="35" width="9" height="11" rx="1" fill="#5a6070" stroke="#2a3040" stroke-width="1.5"/>
  <rect x="26" y="35" width="9" height="11" rx="1" fill="#5a6070" stroke="#2a3040" stroke-width="1.5"/>
  <!-- 足の継ぎ目 -->
  <line x1="13" y1="40" x2="22" y2="40" stroke="#2a3040" stroke-width="1"/>
  <line x1="26" y1="40" x2="35" y2="40" stroke="#2a3040" stroke-width="1"/>
  <!-- 腕（左） -->
  <rect x="4"  y="16" width="10" height="18" rx="2" fill="#5a6070" stroke="#2a3040" stroke-width="1.5"/>
  <rect x="3"  y="30" width="12" height="9"  rx="1" fill="#6a7080" stroke="#2a3040" stroke-width="1.3"/>
  <!-- 腕（右） -->
  <rect x="34" y="16" width="10" height="18" rx="2" fill="#5a6070" stroke="#2a3040" stroke-width="1.5"/>
  <rect x="33" y="30" width="12" height="9"  rx="1" fill="#6a7080" stroke="#2a3040" stroke-width="1.3"/>
  <!-- パネルライン -->
  <line x1="4"  y1="24" x2="14" y2="24" stroke="#2a3040" stroke-width="1"/>
  <line x1="34" y1="24" x2="44" y2="24" stroke="#2a3040" stroke-width="1"/>
  <!-- 胴体 -->
  <rect x="12" y="14" width="24" height="23" rx="2" fill="#6a7080" stroke="#2a3040" stroke-width="1.8"/>
  <!-- 胸パネル -->
  <rect x="15" y="17" width="8"  height="9" rx="1" fill="#5a6070" stroke="#2a3040" stroke-width="0.9"/>
  <rect x="25" y="17" width="8"  height="9" rx="1" fill="#5a6070" stroke="#2a3040" stroke-width="0.9"/>
  <rect x="15" y="28" width="18" height="7" rx="1" fill="#5a6070" stroke="#2a3040" stroke-width="0.9"/>
  <!-- コアの光 -->
  <circle cx="24" cy="21" r="3" fill="#ff4400" opacity="0.9"/>
  <circle cx="24" cy="21" r="1.5" fill="#ffaa00"/>
  <!-- 首 -->
  <rect x="18" y="8"  width="12" height="7"  rx="1" fill="#6a7080" stroke="#2a3040" stroke-width="1.4"/>
  <!-- 頭 -->
  <rect x="11" y="2"  width="26" height="18" rx="3" fill="#707888" stroke="#2a3040" stroke-width="1.8"/>
  <!-- 顔パネル線 -->
  <line x1="11" y1="10" x2="37" y2="10" stroke="#2a3040" stroke-width="1" opacity="0.6"/>
  <line x1="11" y1="14" x2="37" y2="14" stroke="#2a3040" stroke-width="1" opacity="0.4"/>
  <!-- 目（赤く光る） -->
  <rect x="14" y="5"  width="7"  height="5" rx="1" fill="#110000"/>
  <rect x="27" y="5"  width="7"  height="5" rx="1" fill="#110000"/>
  <rect x="15" y="6"  width="5"  height="3" rx="1" fill="#ff2200"/>
  <rect x="28" y="6"  width="5"  height="3" rx="1" fill="#ff2200"/>
  <!-- ボルト -->
  <circle cx="12" cy="3"  r="1.5" fill="#4a5060" stroke="#2a3040" stroke-width="0.8"/>
  <circle cx="36" cy="3"  r="1.5" fill="#4a5060" stroke="#2a3040" stroke-width="0.8"/>
  <circle cx="12" cy="19" r="1.5" fill="#4a5060" stroke="#2a3040" stroke-width="0.8"/>
  <circle cx="36" cy="19" r="1.5" fill="#4a5060" stroke="#2a3040" stroke-width="0.8"/>
</svg>
