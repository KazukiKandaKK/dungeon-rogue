<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bt_wing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5a4348"/>
      <stop offset="55%" stop-color="#2a1a20"/>
      <stop offset="100%" stop-color="#0a0204"/>
    </linearGradient>
    <linearGradient id="bt_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#6a4e52"/>
      <stop offset="100%" stop-color="#1e0e12"/>
    </linearGradient>
    <linearGradient id="bt_ear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#c48888"/>
      <stop offset="100%" stop-color="#4a1818"/>
    </linearGradient>
    <radialGradient id="bt_eye" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#ffdd20"/>
      <stop offset="60%" stop-color="#ff3000"/>
      <stop offset="100%" stop-color="#4a0000"/>
    </radialGradient>
  </defs>

  <!-- 影 -->
  <ellipse cx="24" cy="45" rx="10" ry="2.5" fill="rgba(0,0,0,0.28)"/>

  <!-- ═══ 翼（左） ═══ -->
  <path d="M24,22 Q18,15 10,12 Q3,10 1,15 Q4,18 6,22 Q3,24 4,28 Q8,23 14,24 Q11,28 12,32 Q17,26 22,26 Z"
        fill="url(#bt_wing)" stroke="#0a0206" stroke-width="0.7"/>
  <!-- 翼骨 -->
  <path d="M24,22 L2,14" stroke="#0a0206" stroke-width="0.7"/>
  <path d="M24,22 L5,22" stroke="#0a0206" stroke-width="0.6" opacity="0.8"/>
  <path d="M24,22 L8,28" stroke="#0a0206" stroke-width="0.6" opacity="0.7"/>
  <path d="M24,22 L14,30" stroke="#0a0206" stroke-width="0.6" opacity="0.7"/>
  <!-- 翼先の爪 -->
  <path d="M2,14 L1,11 L2.5,13 Z" fill="#0a0206"/>

  <!-- ═══ 翼（右） ═══ -->
  <path d="M24,22 Q30,15 38,12 Q45,10 47,15 Q44,18 42,22 Q45,24 44,28 Q40,23 34,24 Q37,28 36,32 Q31,26 26,26 Z"
        fill="url(#bt_wing)" stroke="#0a0206" stroke-width="0.7"/>
  <path d="M24,22 L46,14" stroke="#0a0206" stroke-width="0.7"/>
  <path d="M24,22 L43,22" stroke="#0a0206" stroke-width="0.6" opacity="0.8"/>
  <path d="M24,22 L40,28" stroke="#0a0206" stroke-width="0.6" opacity="0.7"/>
  <path d="M24,22 L34,30" stroke="#0a0206" stroke-width="0.6" opacity="0.7"/>
  <path d="M46,14 L47,11 L45.5,13 Z" fill="#0a0206"/>

  <!-- ═══ 本体（毛のある胴） ═══ -->
  <ellipse cx="24" cy="25" rx="7.5" ry="9" fill="url(#bt_body)" stroke="#0a0204" stroke-width="1"/>
  <!-- お腹の毛 -->
  <path d="M18,23 Q20,25 18,27 M20,22 Q22,24 20,26 M24,22 Q26,24 24,26 M28,23 Q30,25 28,27 M26,29 Q27,31 25,32 M22,30 Q23,32 21,33" stroke="#a88080" stroke-width="0.4" fill="none" opacity="0.5"/>
  <!-- 胸の白 -->
  <ellipse cx="24" cy="28" rx="2.5" ry="2.5" fill="#c4a0a0" opacity="0.5"/>

  <!-- ═══ 耳 ═══ -->
  <path d="M19,16 L16,8 L22,14 Z" fill="url(#bt_body)" stroke="#0a0204" stroke-width="0.7"/>
  <path d="M29,16 L32,8 L26,14 Z" fill="url(#bt_body)" stroke="#0a0204" stroke-width="0.7"/>
  <path d="M19.5,15.5 L17.5,10 L21,14" fill="url(#bt_ear)"/>
  <path d="M28.5,15.5 L30.5,10 L27,14" fill="url(#bt_ear)"/>

  <!-- ═══ 目（赤く発光） ═══ -->
  <ellipse cx="20" cy="22" rx="3.2" ry="3.5" fill="#0a0000"/>
  <ellipse cx="28" cy="22" rx="3.2" ry="3.5" fill="#0a0000"/>
  <ellipse cx="20" cy="22" rx="3.7" ry="4.0" fill="url(#bt_eye)" opacity="0.5"/>
  <ellipse cx="28" cy="22" rx="3.7" ry="4.0" fill="url(#bt_eye)" opacity="0.5"/>
  <ellipse cx="20" cy="22" rx="1.8" ry="2.2" fill="#ff2a00"/>
  <ellipse cx="28" cy="22" rx="1.8" ry="2.2" fill="#ff2a00"/>
  <ellipse cx="20" cy="22" rx="0.7" ry="1.5" fill="#1a0000"/>
  <ellipse cx="28" cy="22" rx="0.7" ry="1.5" fill="#1a0000"/>
  <ellipse cx="20.7" cy="21.2" rx="0.6" ry="0.7" fill="#ffffff"/>
  <ellipse cx="28.7" cy="21.2" rx="0.6" ry="0.7" fill="#ffffff"/>

  <!-- ═══ 鼻 ═══ -->
  <path d="M22,28 Q24,30.5 26,28 L24,29.5 Z" fill="#3a1a1a" stroke="#0a0204" stroke-width="0.5"/>

  <!-- ═══ 牙 ═══ -->
  <path d="M22,30 L21,34 L23,32 Z" fill="#f0ead6" stroke="#5a4a20" stroke-width="0.3"/>
  <path d="M26,30 L27,34 L25,32 Z" fill="#f0ead6" stroke="#5a4a20" stroke-width="0.3"/>

  <!-- ═══ リムライト ═══ -->
  <path d="M17,20 Q17,26 18,32" stroke="rgba(200,140,140,0.3)" stroke-width="0.6" fill="none"/>
  <path d="M31,20 Q31,26 30,32" stroke="rgba(160,100,100,0.25)" stroke-width="0.6" fill="none"/>
</svg>
