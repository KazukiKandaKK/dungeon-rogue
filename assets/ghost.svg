  <ellipse cx="19.5" cy="18.5" rx="1.5" ry="2" fill="rgba(150,200,255,0.7)"/>
  <ellipse cx="31.5" cy="18.5" rx="1.5" ry="2" fill="rgba(150,200,255,0.7)"/>
  <!-- 口 -->
  <path d="M19,28 Q24,32 29,28" stroke="rgba(50,80,120,0.8)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 浮遊する光の粒 -->
  <circle cx="10" cy="14" r="1.5" fill="rgba(200,240,255,0.8)"/>
  <circle cx="38" cy="18" r="1" fill="rgba(200,240,255,0.8)"/>
  <circle cx="14" cy="8"  r="1.2" fill="rgba(200,240,255,0.6)"/>
  <circle cx="36" cy="10" r="1" fill="rgba(200,240,255,0.6)"/>
