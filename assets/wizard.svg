<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- ── 闇魔術師 ── -->
  <ellipse cx="24" cy="46" rx="10" ry="3" fill="rgba(0,0,0,0.22)"/>

  <!-- ローブ（裾） -->
  <path d="M11,44 Q14,30 17,28 L31,28 Q34,30 37,44 Z" fill="#2a1040" stroke="#180828" stroke-width="1.2"/>
  <!-- ローブ光沢 -->
  <path d="M18,30 Q20,28 22,30 Q21,38 20,44 L18,44 Z" fill="rgba(168,85,247,0.15)"/>

  <!-- 杖（左側） -->
  <line x1="8" y1="45" x2="10" y2="18" stroke="#4a2a70" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 杖の宝珠 -->
  <circle cx="10" cy="16" r="4.5" fill="#c084fc" stroke="#7c3aed" stroke-width="1"/>
  <circle cx="10" cy="16" r="2.5" fill="#f0abfc" opacity="0.7"/>
  <circle cx="9"  cy="15" r="1"   fill="white"   opacity="0.6"/>
  <!-- 魔力の煌めき -->
  <circle cx="10" cy="16" r="6" fill="none" stroke="rgba(192,132,252,0.35)" stroke-width="1.5"/>

  <!-- 胴体 -->
  <rect x="14" y="26" width="20" height="5" rx="2" fill="#3a1a58" stroke="#2a0a48" stroke-width="1"/>
  <!-- 魔法陣ブローチ -->
  <circle cx="24" cy="28.5" r="3" fill="#1a0a30" stroke="#c084fc" stroke-width="0.8"/>
  <path d="M24,25.8 L24.8,27.8 L26.8,27.8 L25.3,28.9 L25.8,30.9 L24,29.8 L22.2,30.9 L22.7,28.9 L21.2,27.8 L23.2,27.8 Z" fill="#c084fc" opacity="0.8" transform="scale(0.7) translate(10,10)"/>

  <!-- 頭 -->
  <circle cx="24" cy="18" r="12" fill="#1e0a30" stroke="#3a1050" stroke-width="1.2"/>
  <!-- 肌色の顔 -->
  <ellipse cx="24" cy="20" rx="8" ry="9" fill="#c8a080" stroke="#8a6040" stroke-width="0.8"/>

  <!-- 帽子 -->
  <path d="M12,17 Q14,12 24,4 Q34,12 36,17 Z" fill="#2a0a50" stroke="#1a0038" stroke-width="1"/>
  <rect x="10" y="16" width="28" height="4" rx="2" fill="#3a1068" stroke="#1a0038" stroke-width="1"/>
  <!-- 帽子の星マーク -->
  <path d="M24,7 L24.6,9 L26.6,9 L25,10.2 L25.6,12.2 L24,11 L22.4,12.2 L23,10.2 L21.4,9 L23.4,9 Z" fill="rgba(240,171,252,0.6)" transform="scale(0.8) translate(6,1)"/>

  <!-- 目（光る紫） -->
  <ellipse cx="19" cy="20" rx="4.5" ry="3.5" fill="#1a0030" stroke="#3a1050" stroke-width="0.8"/>
  <ellipse cx="29" cy="20" rx="4.5" ry="3.5" fill="#1a0030" stroke="#3a1050" stroke-width="0.8"/>
  <ellipse cx="19" cy="20" rx="3"   ry="2.5" fill="#a855f7"/>
  <ellipse cx="29" cy="20" rx="3"   ry="2.5" fill="#a855f7"/>
  <ellipse cx="19" cy="20" rx="1.2" ry="2"   fill="#e879f9"/>
  <ellipse cx="29" cy="20" rx="1.2" ry="2"   fill="#e879f9"/>
  <ellipse cx="20" cy="19" rx="1"   ry="0.8" fill="rgba(255,255,255,0.6)"/>
  <ellipse cx="30" cy="19" rx="1"   ry="0.8" fill="rgba(255,255,255,0.6)"/>

  <!-- 眉（細く怪しい） -->
  <path d="M15,17 Q19,15.5 22,17" stroke="#2a0a50" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M26,17 Q29,15.5 33,17" stroke="#2a0a50" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- 口（薄い笑み） -->
  <path d="M20,24 Q24,26.5 28,24" stroke="#8a6040" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
