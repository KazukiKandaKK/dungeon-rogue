<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="ct_body" cx="45%" cy="35%" r="70%">
      <stop offset="0%"  stop-color="#ffd28a"/>
      <stop offset="55%" stop-color="#e88a2a"/>
      <stop offset="100%" stop-color="#8a3a08"/>
    </radialGradient>
    <radialGradient id="ct_face" cx="50%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#ffe4b0"/>
      <stop offset="70%" stop-color="#ec9a3a"/>
      <stop offset="100%" stop-color="#9a4a10"/>
    </radialGradient>
    <linearGradient id="ct_earin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffc0d8"/>
      <stop offset="100%" stop-color="#e07090"/>
    </linearGradient>
  </defs>

  <!-- 影 -->
  <ellipse cx="24" cy="45" rx="14" ry="3" fill="rgba(0,0,0,0.30)"/>

  <!-- 巻きしっぽ -->
  <path d="M36,36 Q44,34 43,26 Q41,22 37,24 Q38,28 36,30 Q34,32 36,36 Z"
        fill="url(#ct_body)" stroke="#6a2800" stroke-width="0.8"/>
  <path d="M38,26 Q40,28 39,30" stroke="#6a2800" stroke-width="0.6" fill="none" opacity="0.6"/>

  <!-- 体 -->
  <ellipse cx="22" cy="36" rx="11" ry="7.5" fill="url(#ct_body)" stroke="#6a2800" stroke-width="1"/>
  <!-- 縞 -->
  <path d="M14,34 Q16,36 14,38" stroke="#6a2800" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M20,39 Q22,41 20,42" stroke="#6a2800" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M28,34 Q30,36 28,38" stroke="#6a2800" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- 足 -->
  <ellipse cx="16" cy="42" rx="2.6" ry="2" fill="#c06820" stroke="#5a2000" stroke-width="0.6"/>
  <ellipse cx="28" cy="42" rx="2.6" ry="2" fill="#c06820" stroke="#5a2000" stroke-width="0.6"/>

  <!-- 耳（三角） -->
  <path d="M13,15 L11,6 L19,12 Z" fill="url(#ct_body)" stroke="#6a2800" stroke-width="0.8"/>
  <path d="M35,15 L37,6 L29,12 Z" fill="url(#ct_body)" stroke="#6a2800" stroke-width="0.8"/>
  <!-- 耳の内側（ピンク） -->
  <path d="M13.5,13 L12.5,8 L17,11.5 Z" fill="url(#ct_earin)"/>
  <path d="M34.5,13 L35.5,8 L31,11.5 Z" fill="url(#ct_earin)"/>

  <!-- 頭 -->
  <ellipse cx="24" cy="22" rx="11" ry="10" fill="url(#ct_face)" stroke="#6a2800" stroke-width="1"/>

  <!-- 縞（額） -->
  <path d="M20,14 Q21,16 20,18" stroke="#6a2800" stroke-width="1" fill="none" opacity="0.55"/>
  <path d="M24,13 Q25,15 24,17" stroke="#6a2800" stroke-width="1" fill="none" opacity="0.55"/>
  <path d="M28,14 Q29,16 28,18" stroke="#6a2800" stroke-width="1" fill="none" opacity="0.55"/>

  <!-- マズル -->
  <ellipse cx="24" cy="26" rx="4" ry="2.8" fill="#fbe4b8" opacity="0.9"/>

  <!-- 鼻 -->
  <path d="M23,24.5 L25,24.5 L24,26 Z" fill="#e0708a" stroke="#8a2844" stroke-width="0.4"/>
  <!-- 口 -->
  <path d="M24,26 Q22,28 20.5,27" stroke="#4a1800" stroke-width="0.7" fill="none"/>
  <path d="M24,26 Q26,28 27.5,27" stroke="#4a1800" stroke-width="0.7" fill="none"/>

  <!-- ひげ -->
  <line x1="18" y1="25" x2="10" y2="24" stroke="#3a1800" stroke-width="0.4"/>
  <line x1="18" y1="26.5" x2="10" y2="27" stroke="#3a1800" stroke-width="0.4"/>
  <line x1="30" y1="25" x2="38" y2="24" stroke="#3a1800" stroke-width="0.4"/>
  <line x1="30" y1="26.5" x2="38" y2="27" stroke="#3a1800" stroke-width="0.4"/>

  <!-- 目（アーモンド、緑） -->
  <ellipse cx="19" cy="21" rx="2.5" ry="3" fill="#0a3010"/>
  <ellipse cx="29" cy="21" rx="2.5" ry="3" fill="#0a3010"/>
  <ellipse cx="19" cy="21.2" rx="2" ry="2.6" fill="#4ac060"/>
  <ellipse cx="29" cy="21.2" rx="2" ry="2.6" fill="#4ac060"/>
  <!-- 瞳孔（細い） -->
  <ellipse cx="19" cy="21.2" rx="0.5" ry="2.4" fill="#001808"/>
  <ellipse cx="29" cy="21.2" rx="0.5" ry="2.4" fill="#001808"/>
  <!-- ハイライト -->
  <ellipse cx="19.8" cy="19.8" rx="0.7" ry="0.9" fill="#ffffff"/>
  <ellipse cx="29.8" cy="19.8" rx="0.7" ry="0.9" fill="#ffffff"/>
</svg>
