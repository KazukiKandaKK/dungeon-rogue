<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="sb_body" cx="60%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f4faff"/>
      <stop offset="55%" stop-color="#dceaf8"/>
      <stop offset="100%" stop-color="#a8c4dc"/>
    </radialGradient>
    <radialGradient id="sb_head" cx="62%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#f4faff"/>
      <stop offset="55%" stop-color="#dceaf8"/>
      <stop offset="100%" stop-color="#a8c4dc"/>
    </radialGradient>
  </defs>

  <!-- 影 -->
  <ellipse cx="24" cy="45.5" rx="11" ry="1.6" fill="rgba(60,90,120,0.25)"/>

  <!-- 胴体 -->
  <ellipse cx="24" cy="36" rx="13" ry="10" fill="url(#sb_body)" stroke="#88aac8" stroke-width="0.8"/>

  <!-- マフラー（後ろから） -->
  <path d="M12,28 Q24,24.5 36,28 Q36,31.5 24,30.5 Q12,31.5 12,28 Z" fill="#ef4444"/>
  <path d="M30,28 Q32.5,31.5 30.5,36 L28,36 L28.5,29 Z" fill="#c53030"/>
  <line x1="29.5" y1="29" x2="29.5" y2="35" stroke="#ff8080" stroke-width="0.7" opacity="0.55"/>
  <line x1="17" y1="26" x2="17" y2="30.5" stroke="#ff8080" stroke-width="0.7" opacity="0.5"/>
  <line x1="24" y1="25.4" x2="24" y2="30.5" stroke="#ff8080" stroke-width="0.7" opacity="0.5"/>
  <line x1="31" y1="26" x2="31" y2="30.5" stroke="#ff8080" stroke-width="0.7" opacity="0.5"/>

  <!-- 腕（枝） -->
  <line x1="12" y1="35" x2="6" y2="32" stroke="#6b4020" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="7" y1="32.5" x2="5" y2="30" stroke="#6b4020" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="36" y1="35" x2="42" y2="32" stroke="#6b4020" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="41" y1="32.5" x2="43" y2="30" stroke="#6b4020" stroke-width="1.3" stroke-linecap="round"/>

  <!-- 頭 -->
  <ellipse cx="24" cy="18" rx="11.5" ry="10.5" fill="url(#sb_head)" stroke="#88aac8" stroke-width="0.8"/>

  <!-- 帽子 -->
  <path d="M14.5,16 Q14,10 18,8 Q24,5 30,8 Q34,10 33.5,16 Z" fill="#1a1a2e"/>
  <rect x="13" y="15.5" width="22" height="2.6" rx="1.3" fill="#1a1a2e"/>
  <rect x="14.5" y="13.5" width="19" height="2" rx="0.8" fill="#ef4444"/>
  <rect x="22" y="13.5" width="4" height="2" fill="#facc15"/>
  <ellipse cx="26" cy="9" rx="5" ry="1.6" fill="rgba(255,255,255,0.2)"/>

  <!-- 頭の後ろの光沢 -->
  <ellipse cx="27" cy="15" rx="5" ry="2" fill="rgba(255,255,255,0.35)"/>

  <!-- 雪キラキラ -->
  <g opacity="0.85">
    <circle cx="8"  cy="22" r="0.9" fill="#ffffff"/>
    <circle cx="40" cy="18" r="0.7" fill="#ffffff"/>
    <circle cx="6"  cy="40" r="0.6" fill="#ffffff"/>
    <circle cx="42" cy="38" r="0.8" fill="#ffffff"/>
  </g>
</svg>
