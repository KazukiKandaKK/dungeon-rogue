<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="sb_body" cx="60%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="60%" stop-color="#d0e4f4"/>
      <stop offset="100%" stop-color="#aac8e0"/>
    </radialGradient>
    <radialGradient id="sb_head" cx="62%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#f0f8ff"/>
      <stop offset="55%" stop-color="#d8ecff"/>
      <stop offset="100%" stop-color="#b8d0e8"/>
    </radialGradient>
    <filter id="sb_glow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 胴体（背面） -->
  <ellipse cx="24" cy="35" rx="13" ry="11" fill="url(#sb_body)" stroke="#88aac8" stroke-width="0.8"/>
  <ellipse cx="22" cy="38" rx="9" ry="6" fill="rgba(100,140,180,0.10)"/>

  <!-- マフラー（背面）たれが後ろに見える -->
  <path d="M13,28 Q24,25 35,28 Q35,31 24,30 Q13,31 13,28 Z" fill="#e83030"/>
  <path d="M31,28 Q33,31 31,36 L29,36 L29,29 Z" fill="#c02020"/>
  <line x1="30" y1="29" x2="30" y2="35" stroke="#ff6060" stroke-width="0.7" opacity="0.5"/>
  <!-- 縞 -->
  <line x1="16" y1="26.5" x2="16" y2="30.5" stroke="#ff6060" stroke-width="0.7" opacity="0.5"/>
  <line x1="24" y1="25.5" x2="24" y2="30" stroke="#ff6060" stroke-width="0.7" opacity="0.5"/>
  <line x1="32" y1="26.5" x2="32" y2="30.5" stroke="#ff6060" stroke-width="0.7" opacity="0.5"/>

  <!-- 腕（枝・背面） -->
  <line x1="11" y1="33" x2="4" y2="28" stroke="#6b4020" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="5" y1="28" x2="3" y2="25.5" stroke="#6b4020" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="5" y1="28" x2="2.5" y2="27" stroke="#6b4020" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="37" y1="33" x2="44" y2="28" stroke="#6b4020" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="43.5" y1="28" x2="46" y2="25.5" stroke="#6b4020" stroke-width="1.4" stroke-linecap="round"/>

  <!-- 頭（背面） -->
  <ellipse cx="24" cy="18" rx="11" ry="10.5" fill="url(#sb_head)" stroke="#88aac8" stroke-width="0.8"/>

  <!-- 帽子（背面） -->
  <rect x="16" y="7.5" width="16" height="9" rx="1" fill="#1a1a2e"/>
  <rect x="13.5" y="15.5" width="21" height="2.5" rx="1" fill="#1a1a2e"/>
  <rect x="16" y="13.5" width="16" height="2" rx="0.5" fill="#e83030"/>
  <rect x="22" y="13.5" width="4" height="2" fill="#d4a820"/>
  <!-- 帽子の後ろ側のわずかな光沢 -->
  <ellipse cx="24" cy="9" rx="5" ry="1.5" fill="rgba(255,255,255,0.12)"/>

  <!-- 雪キラキラ -->
  <g filter="url(#sb_glow)" opacity="0.7">
    <circle cx="8" cy="22" r="1" fill="white"/>
    <circle cx="40" cy="18" r="0.8" fill="white"/>
    <circle cx="6" cy="40" r="0.7" fill="white"/>
    <circle cx="42" cy="38" r="0.9" fill="white"/>
  </g>
</svg>
