<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="ss_body" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#e4eef8"/>
      <stop offset="100%" stop-color="#b4ccE0"/>
    </radialGradient>
    <radialGradient id="ss_head" cx="35%" cy="28%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#e4eef8"/>
      <stop offset="100%" stop-color="#b4ccE0"/>
    </radialGradient>
    <radialGradient id="ss_blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8fa8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff8fa8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ss_eye" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#3a3a54"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
  </defs>

  <!-- 影 -->
  <ellipse cx="22" cy="45.5" rx="10" ry="1.5" fill="rgba(60,90,120,0.25)"/>

  <!-- 胴体 -->
  <ellipse cx="22" cy="36" rx="11" ry="9.5" fill="url(#ss_body)" stroke="#88aac8" stroke-width="0.8"/>

  <!-- マフラー -->
  <path d="M11,28 Q22,25 33,28 Q33,31 22,30.5 Q11,31 11,28 Z" fill="#ef4444"/>
  <path d="M28,28 Q30,31 29,35 L27,35 L27.5,28.5 Z" fill="#c53030"/>
  <line x1="28.5" y1="29" x2="28" y2="34" stroke="#ff8080" stroke-width="0.7" opacity="0.55"/>

  <!-- 腕（枝・前） -->
  <line x1="31" y1="34" x2="37" y2="31" stroke="#6b4020" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="36" y1="31.5" x2="38.5" y2="29" stroke="#6b4020" stroke-width="1.3" stroke-linecap="round"/>
  <!-- 腕（後ろ） -->
  <line x1="13" y1="34" x2="8" y2="31" stroke="#6b4020" stroke-width="2" stroke-linecap="round"/>

  <!-- ボタン -->
  <circle cx="24" cy="33" r="1" fill="#2a2a3e"/>
  <circle cx="25" cy="37" r="1" fill="#2a2a3e"/>
  <circle cx="24.5" cy="41" r="1" fill="#2a2a3e"/>

  <!-- 頭 -->
  <ellipse cx="22" cy="18" rx="10.5" ry="10" fill="url(#ss_head)" stroke="#88aac8" stroke-width="0.8"/>
  <ellipse cx="18" cy="12.5" rx="4.5" ry="2" fill="rgba(255,255,255,0.5)"/>

  <!-- 帽子 -->
  <path d="M12.5,16 Q12,10 16,8 Q22,5 28,8 Q32,10 31.5,16 Z" fill="#1a1a2e"/>
  <rect x="11" y="15.5" width="22" height="2.6" rx="1.3" fill="#1a1a2e"/>
  <rect x="12.5" y="13.5" width="19" height="2" rx="0.8" fill="#ef4444"/>
  <rect x="20" y="13.5" width="4" height="2" fill="#facc15"/>

  <!-- 顔（横向き） -->
  <ellipse cx="30" cy="20.5" rx="3" ry="2" fill="url(#ss_blush)"/>

  <!-- 目（大きくまん丸） -->
  <ellipse cx="27.5" cy="18" rx="2.3" ry="2.5" fill="url(#ss_eye)"/>
  <ellipse cx="28.4" cy="16.9" rx="0.95" ry="0.85" fill="#ffffff"/>
  <circle cx="26.8" cy="19" r="0.4" fill="#ffffff" opacity="0.75"/>

  <!-- 鼻にんじん -->
  <path d="M30,21 L35,22 L30,23 Z" fill="#fb923c" stroke="#c2410c" stroke-width="0.3"/>
  <line x1="30.5" y1="21.5" x2="34" y2="22" stroke="#c2410c" stroke-width="0.3"/>

  <!-- 口（ニコッ） -->
  <path d="M28,24.5 Q30,26.3 32,24.5" fill="none" stroke="#2a2a3e" stroke-width="1" stroke-linecap="round"/>

  <!-- 雪キラキラ -->
  <g opacity="0.85">
    <circle cx="6"  cy="22" r="0.9" fill="#ffffff"/>
    <circle cx="42" cy="16" r="0.7" fill="#ffffff"/>
    <circle cx="5"  cy="40" r="0.6" fill="#ffffff"/>
    <circle cx="43" cy="42" r="0.8" fill="#ffffff"/>
  </g>
</svg>
