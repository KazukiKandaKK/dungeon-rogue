<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="ss_body" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f0f8ff"/>
      <stop offset="60%" stop-color="#d8eaf8"/>
      <stop offset="100%" stop-color="#b0ccE0"/>
    </radialGradient>
    <radialGradient id="ss_head" cx="35%" cy="30%" r="58%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="55%" stop-color="#e0f0ff"/>
      <stop offset="100%" stop-color="#b8d4ec"/>
    </radialGradient>
    <radialGradient id="ss_blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaaaa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffaaaa" stop-opacity="0"/>
    </radialGradient>
    <filter id="ss_glow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══ 胴体（横向き・少し楕円）═══ -->
  <ellipse cx="22" cy="35" rx="11" ry="10" fill="url(#ss_body)" stroke="#88aac8" stroke-width="0.8"/>

  <!-- ═══ マフラー（横）═══ -->
  <path d="M11,28 Q22,25.5 33,28 Q33,30.5 22,30 Q11,30.5 11,28 Z" fill="#e83030"/>
  <!-- たれ（前側に垂れる） -->
  <path d="M28,28 Q30,30 29,34 L27,34 L27.5,28.5 Z" fill="#c02020"/>
  <line x1="28.5" y1="29" x2="28" y2="33.5" stroke="#ff6060" stroke-width="0.7" opacity="0.5"/>

  <!-- ═══ 前腕（剣持ち）═══ -->
  <line x1="32" y1="32" x2="38" y2="27" stroke="#6b4020" stroke-width="2.2" stroke-linecap="round"/>
  <!-- 剣 -->
  <rect x="36.5" y="13" width="2" height="15" rx="0.5" fill="#d0e8f8" stroke="#88aacc" stroke-width="0.5"/>
  <line x1="37.5" y1="13" x2="37.5" y2="27" stroke="white" stroke-width="0.4" opacity="0.8"/>
  <rect x="34.5" y="26.5" width="6" height="1.8" rx="0.8" fill="#d4a820"/>
  <ellipse cx="37.5" cy="29" rx="1.4" ry="1.1" fill="#d4a820"/>

  <!-- ═══ 後腕（短く）═══ -->
  <line x1="12" y1="32" x2="7" y2="28" stroke="#6b4020" stroke-width="2" stroke-linecap="round"/>
  <line x1="7.5" y1="28" x2="5.5" y2="26" stroke="#6b4020" stroke-width="1.3" stroke-linecap="round"/>

  <!-- ═══ ボタン（横から見えるもの）═══ -->
  <circle cx="25" cy="30.5" r="1" fill="#334"/>
  <circle cx="26" cy="34.5" r="1" fill="#334"/>
  <circle cx="25.5" cy="38.5" r="1" fill="#334"/>

  <!-- ═══ 頭（横向き・少し前傾き）═══ -->
  <ellipse cx="22" cy="18" rx="10" ry="10.5" fill="url(#ss_head)" stroke="#88aac8" stroke-width="0.8"/>

  <!-- ═══ 帽子（横）═══ -->
  <rect x="14" y="7.5" width="15" height="9" rx="1" fill="#1a1a2e"/>
  <rect x="12" y="15.5" width="20" height="2.5" rx="1" fill="#1a1a2e"/>
  <rect x="14" y="13.5" width="15" height="2" rx="0.5" fill="#e83030"/>
  <rect x="20" y="13.5" width="4" height="2" fill="#d4a820"/>

  <!-- ═══ 顔（横向き）═══ -->
  <!-- ほっぺ -->
  <ellipse cx="30" cy="19.5" rx="2.5" ry="1.8" fill="url(#ss_blush)"/>

  <!-- 目（横から1つ見える） -->
  <ellipse cx="28" cy="17" rx="1.8" ry="2" fill="#1a1a2e"/>
  <ellipse cx="28.7" cy="16.2" rx="0.6" ry="0.5" fill="white" opacity="0.9"/>

  <!-- 鼻（横から一番目立つ）にんじん -->
  <path d="M31,20.5 L35.5,21.5 L31,22.5 Z" fill="#e87020"/>
  <line x1="31.5" y1="21" x2="34.5" y2="21.5" stroke="#c05010" stroke-width="0.4"/>

  <!-- 口（横から） -->
  <circle cx="29.5" cy="23.5" r="0.9" fill="#334"/>
  <circle cx="31.5" cy="24.2" r="0.9" fill="#334"/>
  <circle cx="33" cy="23.5" r="0.9" fill="#334"/>

  <!-- ═══ 雪キラキラ ═══ -->
  <g filter="url(#ss_glow)" opacity="0.7">
    <circle cx="6" cy="22" r="1" fill="white"/>
    <circle cx="42" cy="16" r="0.8" fill="white"/>
    <circle cx="5" cy="40" r="0.7" fill="white"/>
    <circle cx="43" cy="42" r="0.9" fill="white"/>
  </g>
</svg>
