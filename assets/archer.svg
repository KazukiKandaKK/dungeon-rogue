<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- ── 弓使いゴブリン（SD チビ） ── -->
  <ellipse cx="24" cy="46" rx="10" ry="3" fill="rgba(0,0,0,0.18)"/>

  <!-- 足 -->
  <rect x="17" y="38" width="6" height="9" rx="1.5" fill="#2a1800" stroke="#1a0c00" stroke-width="1"/>
  <rect x="25" y="38" width="6" height="9" rx="1.5" fill="#2a1800" stroke="#1a0c00" stroke-width="1"/>

  <!-- 胴体（薄い革鎧） -->
  <rect x="13" y="27" width="22" height="13" rx="3" fill="#5a7a30" stroke="#304010" stroke-width="1.2"/>
  <rect x="17" y="29" width="14" height="8" rx="1.5" fill="#486228" stroke="#304010" stroke-width="0.7"/>
  <!-- 矢筒（背中） -->
  <rect x="8"  y="26" width="5"  height="12" rx="2" fill="#8b5e1c" stroke="#5a3800" stroke-width="0.8"/>
  <line x1="9"  y1="27" x2="12" y2="27" stroke="#c08030" stroke-width="0.8"/>
  <line x1="9"  y1="29" x2="12" y2="29" stroke="#c08030" stroke-width="0.8"/>
  <!-- 矢 -->
  <line x1="9"  y1="25" x2="9"  y2="21" stroke="#c08030" stroke-width="1.2"/>
  <line x1="11" y1="25" x2="11" y2="20" stroke="#c08030" stroke-width="1.2"/>
  <line x1="13" y1="25" x2="13" y2="22" stroke="#c08030" stroke-width="1.2"/>

  <!-- 弓（右側） -->
  <path d="M38,18 Q45,24 38,30" fill="none" stroke="#8b5e1c" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="18" x2="38" y2="30" stroke="#c0a060" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- 矢（構え中） -->
  <line x1="26" y1="24" x2="40" y2="24" stroke="#c08030" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="40,24 37,22.5 37,25.5" fill="#c08030"/>

  <!-- 耳 -->
  <path d="M9,18 Q4,14 6,10 Q8,8 11,14 Z"  fill="#4a7a28" stroke="#2a5010" stroke-width="1"/>
  <path d="M39,18 Q44,14 42,10 Q40,8 37,14 Z" fill="#4a7a28" stroke="#2a5010" stroke-width="1"/>

  <!-- 頭 -->
  <circle cx="24" cy="18" r="13" fill="#5a8a30" stroke="#304010" stroke-width="1.3"/>

  <!-- 髪 -->
  <path d="M12,15 Q11,6 18,4 Q24,2 30,4 Q37,6 36,15" fill="#3a5a18" stroke="#2a4010" stroke-width="0.8"/>
  <path d="M14,12 L12,4 L16,10 Z" fill="#3a5a18" stroke="#2a4010" stroke-width="0.6"/>
  <path d="M34,12 L36,4 L32,10 Z" fill="#3a5a18" stroke="#2a4010" stroke-width="0.6"/>

  <!-- 目（細く赤） -->
  <ellipse cx="18.5" cy="20" rx="5"   ry="4"   fill="#ffeecc" stroke="#202020" stroke-width="1"/>
  <ellipse cx="29.5" cy="20" rx="5"   ry="4"   fill="#ffeecc" stroke="#202020" stroke-width="1"/>
  <ellipse cx="18.5" cy="20" rx="3.5" ry="3"   fill="#cc1010"/>
  <ellipse cx="29.5" cy="20" rx="3.5" ry="3"   fill="#cc1010"/>
  <ellipse cx="18.5" cy="20" rx="1.0" ry="2.5" fill="#0a0000"/>
  <ellipse cx="29.5" cy="20" rx="1.0" ry="2.5" fill="#0a0000"/>
  <ellipse cx="19.8" cy="18.8" rx="1.2" ry="1" fill="rgba(255,180,180,0.7)"/>
  <ellipse cx="30.8" cy="18.8" rx="1.2" ry="1" fill="rgba(255,180,180,0.7)"/>
  <!-- 眉 -->
  <path d="M14,16.5 Q18.5,14 22,16.5" stroke="#1a3000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M26,16.5 Q29.5,14 34,16.5" stroke="#1a3000" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 鼻・口 -->
  <path d="M22,23 Q24,25 26,23 Q25,26 24,26 Q23,26 22,23Z" fill="#4a7a28" stroke="#2a5010" stroke-width="0.7"/>
  <path d="M19,27 Q24,31 29,27" stroke="#1a0a00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M20,27 L19.5,30 L22,28Z" fill="white" stroke="#808080" stroke-width="0.5"/>
  <path d="M28,27 L28.5,30 L26,28Z" fill="white" stroke="#808080" stroke-width="0.5"/>
</svg>
