<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 深淵魔王 — 奈落の城ボス -->
  <defs>
    <linearGradient id="ad_skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <linearGradient id="ad_wing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <radialGradient id="ad_eye" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fde047"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <radialGradient id="ad_flame" cx="50%" cy="100%" r="100%">
      <stop offset="0%"  stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="rgba(127,29,29,0)"/>
    </radialGradient>
  </defs>

  <!-- 背景の炎オーラ -->
  <ellipse cx="32" cy="34" rx="30" ry="28" fill="url(#ad_flame)" opacity="0.35"/>

  <!-- 影 -->
  <ellipse cx="32" cy="60" rx="22" ry="2.8" fill="rgba(0,0,0,0.55)"/>

  <!-- 左翼 -->
  <g>
    <path d="M18,22 Q4,12 2,26 Q8,24 12,28 L14,22 Q6,20 4,30 Q10,30 14,34 L14,26 Q10,34 18,36 Z"
          fill="url(#ad_wing)" stroke="#0c0a09" stroke-width="0.8"/>
    <!-- 翼の脈 -->
    <g stroke="#7f1d1d" stroke-width="0.5" fill="none">
      <path d="M8,24 L16,28"/>
      <path d="M6,30 L14,32"/>
    </g>
  </g>
  <!-- 右翼 -->
  <g>
    <path d="M46,22 Q60,12 62,26 Q56,24 52,28 L50,22 Q58,20 60,30 Q54,30 50,34 L50,26 Q54,34 46,36 Z"
          fill="url(#ad_wing)" stroke="#0c0a09" stroke-width="0.8"/>
    <g stroke="#7f1d1d" stroke-width="0.5" fill="none">
      <path d="M56,24 L48,28"/>
      <path d="M58,30 L50,32"/>
    </g>
  </g>

  <!-- 脚 -->
  <path d="M24,48 L22,60 L28,60 L28,48 Z" fill="url(#ad_skin)" stroke="#1c1917" stroke-width="0.7"/>
  <path d="M40,48 L36,48 L36,60 L42,60 Z" fill="url(#ad_skin)" stroke="#1c1917" stroke-width="0.7"/>
  <!-- 蹄（割れた爪） -->
  <path d="M21,60 L24,56 L25,60 Z" fill="#1c1917"/>
  <path d="M26,60 L28,56 L29,60 Z" fill="#1c1917"/>
  <path d="M35,60 L37,56 L38,60 Z" fill="#1c1917"/>
  <path d="M40,60 L43,56 L43,60 Z" fill="#1c1917"/>

  <!-- 胴（鎧＋赤い魔族の肌） -->
  <path d="M20,28 Q18,40 22,50 L42,50 Q46,40 44,28 Z"
        fill="url(#ad_skin)" stroke="#1c1917" stroke-width="0.9"/>
  <!-- 鎧プレート -->
  <path d="M20,34 Q32,32 44,34" stroke="#1c1917" stroke-width="0.7" fill="none"/>
  <path d="M22,42 L42,42" stroke="#1c1917" stroke-width="0.4"/>
  <!-- 胸の紋章（逆五芒星） -->
  <g transform="translate(32 40)">
    <circle r="4" fill="#0c0a09" stroke="#fbbf24" stroke-width="0.6"/>
    <path d="M0,-3 L1,1 L4,1 L1.5,2.5 L2,5 L0,3 L-2,5 L-1.5,2.5 L-4,1 L-1,1 Z"
          fill="#fbbf24" transform="rotate(180)"/>
  </g>

  <!-- 肩鎧＋棘 -->
  <ellipse cx="16" cy="30" rx="5" ry="4" fill="#1c1917" stroke="#0c0a09" stroke-width="0.5"/>
  <ellipse cx="48" cy="30" rx="5" ry="4" fill="#1c1917" stroke="#0c0a09" stroke-width="0.5"/>
  <path d="M14,26 L12,22 L17,24 Z" fill="#78716c" stroke="#1c1917" stroke-width="0.4"/>
  <path d="M50,26 L52,22 L47,24 Z" fill="#78716c" stroke="#1c1917" stroke-width="0.4"/>

  <!-- 右腕＋業火の剣 -->
  <path d="M48,32 Q54,38 52,48" stroke="url(#ad_skin)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M48,32 Q54,38 52,48" stroke="#1c1917" stroke-width="0.5" fill="none"/>
  <!-- 剣 -->
  <g transform="translate(52 48) rotate(20)">
    <rect x="-1" y="-26" width="2" height="22" fill="#e7e5e4" stroke="#0c0a09" stroke-width="0.5"/>
    <!-- 刀身の炎 -->
    <path d="M-1,-26 Q-3,-22 -1,-18 Q0,-24 2,-26 Z" fill="#fbbf24" opacity="0.9"/>
    <path d="M-1,-22 Q-2,-18 -1,-14 Q0,-20 1,-22 Z" fill="#f97316" opacity="0.9"/>
    <!-- 鍔 -->
    <rect x="-3" y="-4" width="6" height="1.5" fill="#7f1d1d" stroke="#0c0a09" stroke-width="0.4"/>
    <rect x="-0.7" y="-3" width="1.4" height="3" fill="#1c1917"/>
  </g>

  <!-- 左腕＋爪 -->
  <path d="M16,32 Q10,38 12,48" stroke="url(#ad_skin)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M16,32 Q10,38 12,48" stroke="#1c1917" stroke-width="0.5" fill="none"/>
  <!-- 爪 -->
  <circle cx="12" cy="48" r="2.4" fill="#7f1d1d" stroke="#1c1917" stroke-width="0.4"/>
  <path d="M10,50 L8,53" stroke="#f5f5f4" stroke-width="0.9"/>
  <path d="M12,51 L11,54" stroke="#f5f5f4" stroke-width="0.9"/>
  <path d="M14,50 L15,53" stroke="#f5f5f4" stroke-width="0.9"/>

  <!-- 首 -->
  <rect x="29" y="24" width="6" height="6" fill="url(#ad_skin)" stroke="#1c1917" stroke-width="0.4"/>

  <!-- 頭 -->
  <ellipse cx="32" cy="18" rx="8" ry="8" fill="url(#ad_skin)" stroke="#1c1917" stroke-width="0.9"/>

  <!-- 角（大きく湾曲） -->
  <path d="M24,14 Q18,4 14,2 Q18,10 22,18 Z" fill="#1c1917" stroke="#0c0a09" stroke-width="0.6"/>
  <path d="M40,14 Q46,4 50,2 Q46,10 42,18 Z" fill="#1c1917" stroke="#0c0a09" stroke-width="0.6"/>
  <!-- 角の節 -->
  <path d="M20,12 L22,13" stroke="#0c0a09" stroke-width="0.4"/>
  <path d="M44,12 L42,13" stroke="#0c0a09" stroke-width="0.4"/>

  <!-- 目（光る） -->
  <ellipse cx="28" cy="18" rx="2" ry="1.6" fill="#0c0a09"/>
  <ellipse cx="36" cy="18" rx="2" ry="1.6" fill="#0c0a09"/>
  <circle cx="28" cy="18" r="1.2" fill="url(#ad_eye)"/>
  <circle cx="36" cy="18" r="1.2" fill="url(#ad_eye)"/>
  <circle cx="28.3" cy="17.7" r="0.4" fill="#fff"/>
  <circle cx="36.3" cy="17.7" r="0.4" fill="#fff"/>
  <!-- 眉（険しい） -->
  <path d="M25,15 L31,16" stroke="#0c0a09" stroke-width="1.1" stroke-linecap="round"/>
  <path d="M39,15 L33,16" stroke="#0c0a09" stroke-width="1.1" stroke-linecap="round"/>

  <!-- 鼻 -->
  <path d="M31,20 L30,23 L34,23 L33,20 Z" fill="#7f1d1d"/>

  <!-- 口＋牙 -->
  <path d="M26,25 Q32,28 38,25 L37,27 Q32,29 27,27 Z" fill="#0c0a09"/>
  <path d="M28,26 L28,29 L29.5,27 Z" fill="#f5f5f4"/>
  <path d="M36,26 L36,29 L34.5,27 Z" fill="#f5f5f4"/>
  <path d="M31,26 L31,28 L32,27 Z" fill="#f5f5f4"/>
  <path d="M33,26 L33,28 L32,27 Z" fill="#f5f5f4"/>

  <!-- 魔力の火花 -->
  <g fill="#fbbf24">
    <circle cx="6" cy="40" r="0.8"/>
    <circle cx="58" cy="42" r="0.8"/>
    <circle cx="12" cy="52" r="0.6"/>
    <circle cx="52" cy="54" r="0.6"/>
  </g>
</svg>
