<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="sk_bone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f5f1e3"/>
      <stop offset="55%" stop-color="#b8b0a0"/>
      <stop offset="100%" stop-color="#5e5648"/>
    </linearGradient>
    <linearGradient id="sk_rust" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#7a6248"/>
      <stop offset="50%" stop-color="#c7b494"/>
      <stop offset="100%" stop-color="#4a3a24"/>
    </linearGradient>
    <linearGradient id="sk_cloth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#6a2a2a"/>
      <stop offset="100%" stop-color="#22080a"/>
    </linearGradient>
    <radialGradient id="sk_eyeglow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#ffd060" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ff6600" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff2200" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 影 -->
  <ellipse cx="24" cy="45.5" rx="10" ry="2.3" fill="rgba(0,0,0,0.30)"/>

  <!-- 破れたマント -->
  <path d="M13,22 Q9,32 12,44 L17,43 Q14,34 16,24 Z" fill="url(#sk_cloth)" stroke="#140204" stroke-width="0.6"/>
  <path d="M35,22 Q39,32 36,44 L31,43 Q34,34 32,24 Z" fill="url(#sk_cloth)" stroke="#140204" stroke-width="0.6"/>
  <path d="M12,40 L14,44 L10,43 Z" fill="#0a0000"/>

  <!-- 脚の骨 -->
  <path d="M20,38 L18,45" stroke="url(#sk_bone)" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M28,38 L30,45" stroke="url(#sk_bone)" stroke-width="2.6" stroke-linecap="round"/>
  <!-- 膝 -->
  <circle cx="19" cy="41" r="1.2" fill="url(#sk_bone)" stroke="#5e5648" stroke-width="0.3"/>
  <circle cx="29" cy="41" r="1.2" fill="url(#sk_bone)" stroke="#5e5648" stroke-width="0.3"/>
  <!-- 足 -->
  <ellipse cx="17.5" cy="45.5" rx="2" ry="1" fill="url(#sk_bone)" stroke="#5e5648" stroke-width="0.4"/>
  <ellipse cx="30.5" cy="45.5" rx="2" ry="1" fill="url(#sk_bone)" stroke="#5e5648" stroke-width="0.4"/>

  <!-- 腰骨 -->
  <path d="M16,34 Q24,38 32,34 L32,38 Q24,40 16,38 Z" fill="url(#sk_bone)" stroke="#5e5648" stroke-width="0.5"/>
  <ellipse cx="20" cy="36.5" rx="1.5" ry="1" fill="#0a0a0a" opacity="0.5"/>
  <ellipse cx="28" cy="36.5" rx="1.5" ry="1" fill="#0a0a0a" opacity="0.5"/>

  <!-- 肋骨籠 -->
  <path d="M17,22 Q17,19 20,18 L28,18 Q31,19 31,22 L32,34 Q24,36 16,34 Z" fill="url(#sk_bone)" stroke="#5e5648" stroke-width="0.7"/>
  <!-- 背骨 -->
  <path d="M24,18 L24,34" stroke="#5e5648" stroke-width="0.6"/>
  <!-- 肋骨の筋 -->
  <path d="M17,22 Q24,23.5 31,22" stroke="#5e5648" stroke-width="0.7" fill="none"/>
  <path d="M17,25 Q24,26.5 31,25" stroke="#5e5648" stroke-width="0.7" fill="none"/>
  <path d="M17.5,28 Q24,29.5 30.5,28" stroke="#5e5648" stroke-width="0.7" fill="none"/>
  <path d="M18,31 Q24,32.5 30,31" stroke="#5e5648" stroke-width="0.7" fill="none"/>
  <!-- 肋骨の間の暗がり -->
  <path d="M19,23.5 L19,32 L20,32 L20,23.5 Z" fill="#2a1a0a" opacity="0.4"/>
  <path d="M28,23.5 L28,32 L29,32 L29,23.5 Z" fill="#2a1a0a" opacity="0.4"/>

  <!-- 腕（左：シールド持ち） -->
  <path d="M14,22 L8,30" stroke="url(#sk_bone)" stroke-width="2.3" stroke-linecap="round"/>
  <circle cx="13" cy="23" r="1.3" fill="url(#sk_bone)" stroke="#5e5648" stroke-width="0.3"/>
  <path d="M8,30 L6,36" stroke="url(#sk_bone)" stroke-width="2" stroke-linecap="round"/>
  <!-- 盾 -->
  <path d="M3,32 Q2,38 6,42 Q10,38 9,32 Z" fill="url(#sk_rust)" stroke="#2a1a0a" stroke-width="0.7"/>
  <path d="M6,34 L6,40" stroke="#2a1a0a" stroke-width="0.4"/>
  <circle cx="6" cy="37" r="0.8" fill="#3a2a10" stroke="#1a0a00" stroke-width="0.3"/>

  <!-- 腕（右：剣持ち） -->
  <path d="M34,22 L40,28" stroke="url(#sk_bone)" stroke-width="2.3" stroke-linecap="round"/>
  <circle cx="35" cy="23" r="1.3" fill="url(#sk_bone)" stroke="#5e5648" stroke-width="0.3"/>
  <path d="M40,28 L44,32" stroke="url(#sk_bone)" stroke-width="2" stroke-linecap="round"/>
  <!-- 剣 -->
  <rect x="43.2" y="30" width="1.7" height="2" rx="0.3" fill="#6a3a18"/>
  <rect x="41.5" y="31.6" width="5" height="1.2" rx="0.3" fill="#8a6a20" stroke="#4a2a00" stroke-width="0.3"/>
  <path d="M43.5,32.5 L45,32.8 L47,44 L45.5,44.3 Z" fill="url(#sk_rust)" stroke="#3a2a10" stroke-width="0.4"/>

  <!-- 首 -->
  <rect x="22.5" y="15" width="3" height="4" fill="url(#sk_bone)" stroke="#5e5648" stroke-width="0.4"/>

  <!-- 頭蓋骨 -->
  <path d="M15,12 Q14,4 24,3 Q34,4 33,12 L33,17 Q30,20 24,20 Q18,20 15,17 Z" fill="url(#sk_bone)" stroke="#5e5648" stroke-width="0.8"/>
  <!-- 頭の影（下半分） -->
  <path d="M15,15 Q18,18 24,19 Q30,18 33,15 L33,17 Q30,20 24,20 Q18,20 15,17 Z" fill="#3a3224" opacity="0.55"/>
  <!-- 頭頂ヒビ -->
  <path d="M22,4 L23,8 L21,7 L22.5,11" stroke="#3a3224" stroke-width="0.5" fill="none"/>
  <path d="M26,5 L28,9" stroke="#3a3224" stroke-width="0.5" fill="none"/>

  <!-- 眼窩（光る） -->
  <ellipse cx="20" cy="12" rx="3" ry="3.4" fill="#0a0400"/>
  <ellipse cx="28" cy="12" rx="3" ry="3.4" fill="#0a0400"/>
  <ellipse cx="20" cy="12" rx="3.4" ry="3.8" fill="url(#sk_eyeglow)" opacity="0.7"/>
  <ellipse cx="28" cy="12" rx="3.4" ry="3.8" fill="url(#sk_eyeglow)" opacity="0.7"/>
  <ellipse cx="20" cy="12" rx="1" ry="1.4" fill="#ffe070"/>
  <ellipse cx="28" cy="12" rx="1" ry="1.4" fill="#ffe070"/>

  <!-- 鼻穴 -->
  <path d="M23,15 L22,18 L23.5,17.5 Z" fill="#1a0a00"/>
  <path d="M25,15 L26,18 L24.5,17.5 Z" fill="#1a0a00"/>

  <!-- 歯 -->
  <rect x="19" y="18" width="2" height="2.5" fill="#e8e3d2" stroke="#5e5648" stroke-width="0.3"/>
  <rect x="21.5" y="18" width="2" height="2.8" fill="#e8e3d2" stroke="#5e5648" stroke-width="0.3"/>
  <rect x="24" y="18" width="2" height="2.8" fill="#e8e3d2" stroke="#5e5648" stroke-width="0.3"/>
  <rect x="26.5" y="18" width="2" height="2.5" fill="#e8e3d2" stroke="#5e5648" stroke-width="0.3"/>

  <!-- 頬骨のリムライト -->
  <path d="M16,11 Q16,15 17,18" stroke="rgba(255,255,220,0.5)" stroke-width="0.5" fill="none"/>
  <path d="M32,11 Q32,15 31,18" stroke="rgba(255,255,220,0.3)" stroke-width="0.5" fill="none"/>
</svg>
