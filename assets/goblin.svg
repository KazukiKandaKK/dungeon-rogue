<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="gb_skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#7ea83a"/>
      <stop offset="55%" stop-color="#4d7220"/>
      <stop offset="100%" stop-color="#1e3508"/>
    </linearGradient>
    <linearGradient id="gb_leather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#6b4a1c"/>
      <stop offset="100%" stop-color="#2a1a06"/>
    </linearGradient>
    <linearGradient id="gb_cloak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#6a4a20"/>
      <stop offset="100%" stop-color="#1a0e04"/>
    </linearGradient>
    <linearGradient id="gb_steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#9faab8"/>
      <stop offset="50%" stop-color="#e6ecf2"/>
      <stop offset="100%" stop-color="#555f6e"/>
    </linearGradient>
  </defs>

  <!-- 影 -->
  <ellipse cx="24" cy="46" rx="12" ry="2.5" fill="rgba(0,0,0,0.35)"/>

  <!-- ボロマント（背後に広がる） -->
  <path d="M13,28 Q8,38 12,45 L17,44 Q14,38 15,30 Z" fill="url(#gb_cloak)" stroke="#120804" stroke-width="0.7"/>
  <path d="M35,28 Q40,38 36,45 L31,44 Q34,38 33,30 Z" fill="url(#gb_cloak)" stroke="#120804" stroke-width="0.7"/>
  <!-- マントの裂け -->
  <path d="M11,42 L14,40 L13,44 Z" fill="#0a0402"/>
  <path d="M37,42 L34,40 L35,44 Z" fill="#0a0402"/>

  <!-- ブーツ（泥まみれ） -->
  <path d="M17,38 L23,38 L23,46 Q20,46 17,45 Z" fill="#201005" stroke="#0a0402" stroke-width="0.6"/>
  <path d="M25,38 L31,38 L31,46 Q28,46 25,45 Z" fill="#201005" stroke="#0a0402" stroke-width="0.6"/>
  <rect x="17" y="40" width="6" height="0.7" fill="#8a6a20" opacity="0.6"/>
  <rect x="25" y="40" width="6" height="0.7" fill="#8a6a20" opacity="0.6"/>

  <!-- 革鎧 -->
  <path d="M13,27 Q13,25 16,24 L32,24 Q35,25 35,27 L34,40 Q24,41 14,40 Z" fill="url(#gb_leather)" stroke="#0a0402" stroke-width="0.8"/>
  <!-- 鋲 -->
  <circle cx="17" cy="28" r="0.6" fill="#8a6a20"/>
  <circle cx="22" cy="27" r="0.6" fill="#8a6a20"/>
  <circle cx="27" cy="27" r="0.6" fill="#8a6a20"/>
  <circle cx="31" cy="28" r="0.6" fill="#8a6a20"/>
  <!-- 胴体ハイライト -->
  <path d="M15,25 Q17,28 17,36" stroke="rgba(255,220,150,0.2)" stroke-width="0.6" fill="none"/>
  <!-- ベルト -->
  <rect x="13" y="33" width="22" height="3" fill="#3a2208" stroke="#0a0402" stroke-width="0.5"/>
  <rect x="22" y="32.5" width="4" height="4" rx="0.5" fill="#a88438" stroke="#4a2a00" stroke-width="0.4"/>

  <!-- 肩当て（とげ付き） -->
  <path d="M9,24 Q11,20 16,22 L16,28 Q12,29 9,28 Z" fill="url(#gb_leather)" stroke="#0a0402" stroke-width="0.7"/>
  <path d="M32,22 Q37,20 39,24 L39,28 Q36,29 32,28 Z" fill="url(#gb_leather)" stroke="#0a0402" stroke-width="0.7"/>
  <path d="M10,22 L12,19 L13,22 Z" fill="#0a0402"/>
  <path d="M35,22 L36,19 L38,22 Z" fill="#0a0402"/>

  <!-- 短剣（錆び刃） -->
  <path d="M37.5,16 L39.5,16 L40,30 L37,30 Z" fill="url(#gb_steel)" stroke="#3a3a3a" stroke-width="0.5"/>
  <path d="M37.5,16 L39.5,16 L40,20 L37,20 Z" fill="#6a3a20" opacity="0.35"/>
  <rect x="36" y="29" width="5" height="1.4" rx="0.3" fill="#6a4a1a" stroke="#3a2000" stroke-width="0.3"/>
  <rect x="37.5" y="30" width="2" height="4" fill="#3a2208" stroke="#0a0402" stroke-width="0.3"/>

  <!-- 耳（長く尖った） -->
  <path d="M8,16 Q2,10 5,7 Q8,8 11,14 Z" fill="url(#gb_skin)" stroke="#1e3508" stroke-width="0.8"/>
  <path d="M40,16 Q46,10 43,7 Q40,8 37,14 Z" fill="url(#gb_skin)" stroke="#1e3508" stroke-width="0.8"/>
  <!-- 耳ピアス -->
  <circle cx="7" cy="12" r="0.7" fill="#a88438" stroke="#4a2a00" stroke-width="0.3"/>
  <circle cx="41" cy="12" r="0.7" fill="#a88438" stroke="#4a2a00" stroke-width="0.3"/>

  <!-- 頭（しゃくれ顎） -->
  <path d="M13,18 Q12,10 18,7 Q24,5 30,7 Q36,10 35,18 Q34,24 30,26 Q24,28 18,26 Q14,24 13,18 Z" fill="url(#gb_skin)" stroke="#0e2004" stroke-width="1"/>
  <!-- 顎の影 -->
  <path d="M16,23 Q24,25 32,23 Q30,26 24,27 Q18,26 16,23 Z" fill="#102a04" opacity="0.6"/>

  <!-- 傷跡 -->
  <path d="M26,11 L31,16" stroke="#2a4008" stroke-width="0.7" opacity="0.7"/>
  <path d="M26.5,11.5 L30.5,15.5" stroke="#c84040" stroke-width="0.3" opacity="0.5"/>

  <!-- 頭の光沢 -->
  <path d="M17,10 Q20,8 24,8" stroke="rgba(200,240,160,0.35)" stroke-width="0.8" fill="none"/>

  <!-- 眉（つりあがり） -->
  <path d="M14,16 Q18,13 22,15.5" stroke="#0a1a02" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M26,15.5 Q30,13 34,16" stroke="#0a1a02" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- 目（邪悪な黄） -->
  <ellipse cx="18.5" cy="19" rx="3.5" ry="2.8" fill="#1a1408" stroke="#0a0804" stroke-width="0.4"/>
  <ellipse cx="29.5" cy="19" rx="3.5" ry="2.8" fill="#1a1408" stroke="#0a0804" stroke-width="0.4"/>
  <ellipse cx="18.5" cy="19" rx="2.2" ry="2.2" fill="#f0c84a"/>
  <ellipse cx="29.5" cy="19" rx="2.2" ry="2.2" fill="#f0c84a"/>
  <ellipse cx="18.5" cy="19" rx="0.7" ry="1.9" fill="#0a0400"/>
  <ellipse cx="29.5" cy="19" rx="0.7" ry="1.9" fill="#0a0400"/>
  <ellipse cx="19" cy="18.3" rx="0.5" ry="0.5" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="30" cy="18.3" rx="0.5" ry="0.5" fill="#ffffff" opacity="0.9"/>

  <!-- 鷲鼻 -->
  <path d="M22.5,20 Q24,22.5 25.5,20 Q25,24 24,24.5 Q23,24 22.5,20 Z" fill="#3a5a18" stroke="#0e2004" stroke-width="0.6"/>

  <!-- ニヤリ口（牙露出） -->
  <path d="M18,25 Q24,29 30,25 L30,26 Q24,30 18,26 Z" fill="#1a0804" stroke="#0a0402" stroke-width="0.5"/>
  <path d="M19.5,25.5 L19,28.5 L21,27 Z" fill="#f0ead6" stroke="#888" stroke-width="0.3"/>
  <path d="M28.5,25.5 L29,28.5 L27,27 Z" fill="#f0ead6" stroke="#888" stroke-width="0.3"/>

  <!-- リムライト -->
  <path d="M12,14 Q13,18 13,24" stroke="rgba(180,255,120,0.3)" stroke-width="0.6" fill="none"/>
  <path d="M36,14 Q35,18 35,24" stroke="rgba(100,160,60,0.25)" stroke-width="0.6" fill="none"/>
</svg>
