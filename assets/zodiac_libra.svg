<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ♎ Libra — 天秤を掲げる女神 -->
  <defs>
    <linearGradient id="li_robe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>

  <!-- オーラ -->
  <ellipse cx="32" cy="32" rx="30" ry="30" fill="rgba(253,224,71,0.15)" stroke="rgba(253,230,138,0.4)" stroke-width="0.6"/>

  <!-- ドレス裾 -->
  <path d="M22,40 Q32,36 42,40 L48,60 L16,60 Z" fill="url(#li_robe)" stroke="#78350f" stroke-width="0.8"/>
  <path d="M22,48 Q32,46 42,48" stroke="#fbbf24" stroke-width="0.8" fill="none"/>
  <path d="M20,54 Q32,52 44,54" stroke="#fbbf24" stroke-width="0.8" fill="none"/>

  <!-- 胴 -->
  <rect x="26" y="26" width="12" height="18" rx="3" fill="#fde68a" stroke="#78350f" stroke-width="0.7"/>
  <rect x="24" y="40" width="16" height="2" fill="#d97706"/>
  <circle cx="32" cy="41" r="1.4" fill="#fde047" stroke="#78350f" stroke-width="0.4"/>

  <!-- 腕（左、高く挙げる） -->
  <path d="M26,30 Q18,26 14,16" stroke="#fde68a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M26,30 Q18,26 14,16" stroke="#78350f" stroke-width="0.5" fill="none" stroke-linecap="round"/>
  <!-- 腕（右、高く挙げる） -->
  <path d="M38,30 Q46,26 50,16" stroke="#fde68a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M38,30 Q46,26 50,16" stroke="#78350f" stroke-width="0.5" fill="none" stroke-linecap="round"/>

  <!-- 頭 -->
  <ellipse cx="32" cy="20" rx="6" ry="6.5" fill="#fde68a" stroke="#78350f" stroke-width="0.8"/>
  <!-- ベール -->
  <path d="M26,15 Q32,11 38,15 Q38,18 32,20 Q26,18 26,15 Z" fill="#fef3c7" stroke="#78350f" stroke-width="0.5"/>
  <!-- 髪 -->
  <path d="M26,19 Q26,10 32,9 Q38,10 38,19 Q36,14 32,14 Q28,14 26,19 Z" fill="#78350f"/>
  <!-- 目（閉じ気味の厳粛な表情） -->
  <path d="M28,20 Q30,21 32,20" stroke="#0c0a09" stroke-width="0.6" fill="none"/>
  <path d="M32,20 Q34,21 36,20" stroke="#0c0a09" stroke-width="0.6" fill="none"/>
  <!-- 唇 -->
  <path d="M30,23 Q32,24 34,23" stroke="#b91c1c" stroke-width="0.6" fill="none"/>

  <!-- 天秤（上部） -->
  <!-- 中央支柱 -->
  <rect x="13.5" y="13" width="1.2" height="4" fill="#fbbf24"/>
  <rect x="49.3" y="13" width="1.2" height="4" fill="#fbbf24"/>
  <!-- 横棒（支点から両側へ） -->
  <line x1="14" y1="14" x2="50" y2="14" stroke="#fbbf24" stroke-width="2"/>
  <!-- 中央装飾（宝石） -->
  <circle cx="32" cy="14" r="2.5" fill="#fef3c7" stroke="#78350f" stroke-width="0.6"/>
  <circle cx="32" cy="14" r="1.2" fill="#fbbf24"/>

  <!-- 吊り紐 -->
  <line x1="14" y1="14" x2="14" y2="24" stroke="#fbbf24" stroke-width="0.7"/>
  <line x1="10" y1="24" x2="18" y2="24" stroke="#fbbf24" stroke-width="0.5"/>
  <line x1="50" y1="14" x2="50" y2="24" stroke="#fbbf24" stroke-width="0.7"/>
  <line x1="46" y1="24" x2="54" y2="24" stroke="#fbbf24" stroke-width="0.5"/>

  <!-- 皿（左） -->
  <path d="M4,24 Q14,32 24,24 Q14,28 4,24 Z" fill="#fde047" stroke="#78350f" stroke-width="0.9"/>
  <!-- 皿（右） -->
  <path d="M40,24 Q50,32 60,24 Q50,28 40,24 Z" fill="#fde047" stroke="#78350f" stroke-width="0.9"/>
  <!-- 皿の輝き -->
  <circle cx="14" cy="25" r="1" fill="#fef3c7" opacity="0.8"/>
  <circle cx="50" cy="25" r="1" fill="#fef3c7" opacity="0.8"/>

  <!-- 脚 -->
  <rect x="28" y="56" width="3" height="6" rx="0.5" fill="#78350f"/>
  <rect x="33" y="56" width="3" height="6" rx="0.5" fill="#78350f"/>
</svg>
