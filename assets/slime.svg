<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- ── スライム（DQ/ディスガイア風 かわいい） ── -->

  <!-- 影 -->
  <ellipse cx="24" cy="45" rx="12" ry="3.5" fill="rgba(0,0,0,0.18)"/>

  <!-- 本体（大きな水滴型） -->
  <path d="M8,30 Q6,18 14,10 Q18,5 24,4 Q30,5 34,10 Q42,18 40,30 Q38,40 24,42 Q10,40 8,30Z"
        fill="#38c8f8" stroke="#0090d0" stroke-width="1.5"/>
  <!-- ゼリー光沢（上） -->
  <path d="M14,12 Q18,7 24,6 Q30,7 34,12 Q30,10 24,9 Q18,10 14,12Z"
        fill="rgba(255,255,255,0.55)"/>
  <!-- ゼリー光沢（左上） -->
  <ellipse cx="16" cy="14" rx="5" ry="3.5" fill="rgba(255,255,255,0.35)" transform="rotate(-20,16,14)"/>

  <!-- 王冠 -->
  <path d="M14,14 L14,8 L18,12 L24,7 L30,12 L34,8 L34,14 Z"
        fill="#ffd060" stroke="#b08000" stroke-width="1"/>
  <!-- 王冠の宝石 -->
  <circle cx="24" cy="8.5" r="2.5" fill="#ff6688" stroke="#cc2244" stroke-width="0.8"/>
  <circle cx="16" cy="9.5" r="1.8" fill="#88ddff" stroke="#2288cc" stroke-width="0.6"/>
  <circle cx="32" cy="9.5" r="1.8" fill="#88ffaa" stroke="#22cc66" stroke-width="0.6"/>

  <!-- 目（大きくキュート） -->
  <!-- 白目 -->
  <ellipse cx="18" cy="26" rx="6"  ry="7"   fill="white" stroke="#2080b0" stroke-width="1.2"/>
  <ellipse cx="30" cy="26" rx="6"  ry="7"   fill="white" stroke="#2080b0" stroke-width="1.2"/>
  <!-- 虹彩（水色） -->
  <ellipse cx="18" cy="27" rx="4"  ry="5.5" fill="#00a0e8"/>
  <ellipse cx="30" cy="27" rx="4"  ry="5.5" fill="#00a0e8"/>
  <!-- 瞳 -->
  <ellipse cx="18" cy="27.5" rx="2.4" ry="3.5" fill="#003860"/>
  <ellipse cx="30" cy="27.5" rx="2.4" ry="3.5" fill="#003860"/>
  <!-- ハイライト（大） -->
  <ellipse cx="20"   cy="24.5" rx="2"   ry="2.5" fill="white"/>
  <ellipse cx="32"   cy="24.5" rx="2"   ry="2.5" fill="white"/>
  <!-- ハイライト（小） -->
  <ellipse cx="17"   cy="29"   rx="1"   ry="1.2" fill="rgba(255,255,255,0.6)"/>
  <ellipse cx="29"   cy="29"   rx="1"   ry="1.2" fill="rgba(255,255,255,0.6)"/>
  <!-- まつ毛 -->
  <path d="M12.5,23 Q18,20.5 23.5,23" stroke="#0070a8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M24.5,23 Q30,20.5 35.5,23" stroke="#0070a8" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- 口（ニコニコ） -->
  <path d="M19,36 Q24,40 29,36" stroke="#0070a8" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- ほっぺ -->
  <ellipse cx="12" cy="31" rx="4" ry="2.5" fill="#aae8ff" opacity="0.5"/>
  <ellipse cx="36" cy="31" rx="4" ry="2.5" fill="#aae8ff" opacity="0.5"/>
</svg>
