<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <ellipse cx="24" cy="46" rx="10" ry="2.5" fill="rgba(100,180,220,0.3)"/>
  <!-- 外側の氷晶 -->
  <polygon points="24,2 26,10 34,8 28,14 36,16 28,18 32,26 24,22 16,26 20,18 12,16 20,14 14,8 22,10" fill="#a0d8f0" stroke="#60a8d0" stroke-width="0.8" opacity="0.7"/>
  <!-- 体（氷柱状） -->
  <path d="M18,14 Q14,20 14,30 Q16,38 24,42 Q32,38 34,30 Q34,20 30,14Z" fill="#c8eeff" stroke="#80c0e8" stroke-width="1.2"/>
  <!-- 氷の内部亀裂 -->
  <path d="M22,16 Q20,22 22,28 Q20,32 22,38" stroke="#80c0e8" stroke-width="0.8" fill="none" opacity="0.6"/>
  <path d="M26,18 Q28,24 26,30 Q28,34 26,40" stroke="#80c0e8" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- 氷晶の腕（左） -->
  <path d="M14,22 Q8,18 4,14" stroke="#a0d0e8" stroke-width="3" stroke-linecap="round" fill="none"/>
  <polygon points="4,14 2,10 6,10 8,14" fill="#c0e8ff" stroke="#80c0e8" stroke-width="0.8"/>
  <!-- 氷晶の腕（右） -->
  <path d="M34,22 Q40,18 44,14" stroke="#a0d0e8" stroke-width="3" stroke-linecap="round" fill="none"/>
  <polygon points="44,14 46,10 42,10 40,14" fill="#c0e8ff" stroke="#80c0e8" stroke-width="0.8"/>
  <!-- コア（青白く光る） -->
  <ellipse cx="24" cy="28" rx="5" ry="7" fill="#80c8f0" opacity="0.6"/>
  <ellipse cx="24" cy="28" rx="3" ry="4" fill="white" opacity="0.5"/>
  <!-- 目（青く光る） -->
  <ellipse cx="20" cy="24" rx="2.5" ry="2.5" fill="#004488"/>
  <ellipse cx="28" cy="24" rx="2.5" ry="2.5" fill="#004488"/>
  <ellipse cx="20" cy="23.5" rx="1.3" ry="1.3" fill="#44aaff"/>
  <ellipse cx="28" cy="23.5" rx="1.3" ry="1.3" fill="#44aaff"/>
  <!-- 氷の粒 -->
  <circle cx="8"  cy="30" r="2"   fill="#c0e8ff" stroke="#80c0e8" stroke-width="0.8" opacity="0.8"/>
  <circle cx="40" cy="26" r="1.5" fill="#c0e8ff" stroke="#80c0e8" stroke-width="0.8" opacity="0.7"/>
  <circle cx="10" cy="40" r="1.2" fill="#a0d8f0" opacity="0.6"/>
</svg>
