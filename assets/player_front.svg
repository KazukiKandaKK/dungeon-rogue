<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="sf_body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#e8f2ff"/>
      <stop offset="100%" stop-color="#bcd4ec"/>
    </radialGradient>
    <radialGradient id="sf_head" cx="38%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#eaf4ff"/>
      <stop offset="100%" stop-color="#bcd4ec"/>
    </radialGradient>
    <radialGradient id="sf_blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8fa8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff8fa8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sf_eye" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#3a3a54"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
  </defs>

  <!-- 足元影 -->
  <ellipse cx="24" cy="45.5" rx="11" ry="1.6" fill="rgba(60,90,120,0.25)"/>

  <!-- ═══ 胴体（丸く大きめ）═══ -->
  <ellipse cx="24" cy="36" rx="13" ry="10" fill="url(#sf_body)" stroke="#9abcd8" stroke-width="0.8"/>

  <!-- ═══ マフラー（ふわっと厚め）═══ -->
  <path d="M12,28 Q24,24.5 36,28 Q36,31.5 24,30.5 Q12,31.5 12,28 Z" fill="#ef4444"/>
  <path d="M13,28.5 Q13,32 15.5,34 L18,33 L16.5,29 Z" fill="#c53030"/>
  <line x1="17" y1="26" x2="17" y2="30.5" stroke="#ff8080" stroke-width="0.8" opacity="0.55"/>
  <line x1="21" y1="25.4" x2="21" y2="30.5" stroke="#ff8080" stroke-width="0.8" opacity="0.55"/>
  <line x1="27" y1="25.4" x2="27" y2="30.5" stroke="#ff8080" stroke-width="0.8" opacity="0.55"/>
  <line x1="31" y1="26" x2="31" y2="30.5" stroke="#ff8080" stroke-width="0.8" opacity="0.55"/>

  <!-- ═══ 腕（枝・短めでちんまり）═══ -->
  <line x1="12" y1="35" x2="6" y2="32" stroke="#6b4020" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="7" y1="32.5" x2="5" y2="30" stroke="#6b4020" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="36" y1="35" x2="42" y2="32" stroke="#6b4020" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="41" y1="32.5" x2="43" y2="30" stroke="#6b4020" stroke-width="1.3" stroke-linecap="round"/>

  <!-- ═══ ボタン ═══ -->
  <circle cx="24" cy="33" r="1.1" fill="#2a2a3e"/>
  <circle cx="23.7" cy="32.7" r="0.35" fill="#6a6a8a"/>
  <circle cx="24" cy="37" r="1.1" fill="#2a2a3e"/>
  <circle cx="23.7" cy="36.7" r="0.35" fill="#6a6a8a"/>
  <circle cx="24" cy="41" r="1.1" fill="#2a2a3e"/>
  <circle cx="23.7" cy="40.7" r="0.35" fill="#6a6a8a"/>

  <!-- ═══ 頭（大きく丸く）═══ -->
  <ellipse cx="24" cy="18" rx="11.5" ry="10.5" fill="url(#sf_head)" stroke="#9abcd8" stroke-width="0.8"/>
  <!-- 頭頂のほんのり光 -->
  <ellipse cx="20" cy="12" rx="5" ry="2" fill="rgba(255,255,255,0.55)"/>

  <!-- ═══ 帽子（丸みのあるとんがり）═══ -->
  <path d="M14.5,16 Q14,10 18,8 Q24,5 30,8 Q34,10 33.5,16 Z" fill="#1a1a2e"/>
  <rect x="13" y="15.5" width="22" height="2.6" rx="1.3" fill="#1a1a2e"/>
  <rect x="14.5" y="13.5" width="19" height="2" rx="0.8" fill="#ef4444"/>
  <rect x="22" y="13.5" width="4" height="2" fill="#facc15"/>
  <circle cx="24" cy="7" r="1.2" fill="#ffffff" opacity="0.9"/>

  <!-- ═══ 顔 ═══ -->
  <!-- ほっぺ（大きめで濃いめ） -->
  <ellipse cx="15.5" cy="21.5" rx="3.5" ry="2.2" fill="url(#sf_blush)"/>
  <ellipse cx="32.5" cy="21.5" rx="3.5" ry="2.2" fill="url(#sf_blush)"/>

  <!-- 目（大きくまん丸・キラキラ 2 点） -->
  <ellipse cx="20" cy="18.5" rx="2.6" ry="2.8" fill="url(#sf_eye)"/>
  <ellipse cx="28" cy="18.5" rx="2.6" ry="2.8" fill="url(#sf_eye)"/>
  <ellipse cx="20.9" cy="17.3" rx="1" ry="0.9" fill="#ffffff"/>
  <ellipse cx="28.9" cy="17.3" rx="1" ry="0.9" fill="#ffffff"/>
  <circle cx="19.2" cy="19.5" r="0.4" fill="#ffffff" opacity="0.75"/>
  <circle cx="27.2" cy="19.5" r="0.4" fill="#ffffff" opacity="0.75"/>

  <!-- 鼻（にんじん・小さくツン） -->
  <path d="M24,20.5 L27,22 L24,22.5 Z" fill="#fb923c"/>
  <path d="M24,20.5 L27,22 L24,22.5 Z" fill="none" stroke="#c2410c" stroke-width="0.3"/>
  <line x1="24.6" y1="21" x2="26.3" y2="21.7" stroke="#c2410c" stroke-width="0.3"/>

  <!-- 口（ニコッと弧 + 小さな舌） -->
  <path d="M21,24.5 Q24,27 27,24.5" fill="none" stroke="#2a2a3e" stroke-width="1" stroke-linecap="round"/>
  <path d="M22.5,25.2 Q24,26.2 25.5,25.2 Q24,25.7 22.5,25.2 Z" fill="#ff7090" opacity="0.85"/>

  <!-- ═══ 雪キラキラ ═══ -->
  <g opacity="0.85">
    <circle cx="7"  cy="20" r="0.9" fill="#ffffff"/>
    <circle cx="41" cy="15" r="0.7" fill="#ffffff"/>
    <circle cx="6"  cy="39" r="0.6" fill="#ffffff"/>
    <circle cx="42" cy="41" r="0.8" fill="#ffffff"/>
    <circle cx="11" cy="7"  r="0.5" fill="#ffffff"/>
  </g>
</svg>
