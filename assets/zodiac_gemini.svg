<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ♊ Gemini — 青赤の双子戦士 -->
  <!-- オーラ -->
  <path d="M32,4 Q14,8 10,24 Q8,44 16,58 Q32,62 48,58 Q56,44 54,24 Q50,8 32,4Z"
        fill="rgba(100,140,255,0.15)" stroke="rgba(180,200,255,0.35)" stroke-width="0.6"/>

  <!-- 左の双子（青） -->
  <g>
    <!-- マント -->
    <path d="M14,30 L8,58 L22,58 L22,30Z" fill="#1e40af" stroke="#0c0a09" stroke-width="0.6"/>
    <!-- 脚 -->
    <rect x="13" y="46" width="4" height="14" rx="1" fill="#1e3a8a" stroke="#0c0a09" stroke-width="0.4"/>
    <rect x="19" y="46" width="4" height="14" rx="1" fill="#1e3a8a" stroke="#0c0a09" stroke-width="0.4"/>
    <!-- ブーツ -->
    <ellipse cx="15" cy="60" rx="3" ry="1.3" fill="#0c0a09"/>
    <ellipse cx="21" cy="60" rx="3" ry="1.3" fill="#0c0a09"/>
    <!-- 胴 -->
    <rect x="11" y="26" width="14" height="22" rx="3" fill="#3b82f6" stroke="#0c0a09" stroke-width="0.6"/>
    <!-- 胸ベルト -->
    <path d="M12,32 L24,32" stroke="#1e3a8a" stroke-width="1.5"/>
    <circle cx="18" cy="32" r="1.3" fill="#fde047"/>
    <!-- 腕 -->
    <rect x="6"  y="28" width="5" height="14" rx="2" fill="#3b82f6" stroke="#0c0a09" stroke-width="0.4"/>
    <rect x="25" y="28" width="5" height="14" rx="2" fill="#3b82f6" stroke="#0c0a09" stroke-width="0.4"/>
    <circle cx="8.5"  cy="43" r="2" fill="#fde68a" stroke="#0c0a09" stroke-width="0.4"/>
    <!-- 頭 -->
    <ellipse cx="18" cy="18" rx="6" ry="6" fill="#fde68a" stroke="#78350f" stroke-width="0.6"/>
    <!-- 髪（青） -->
    <path d="M12,16 Q12,8 18,7 Q24,8 24,16 Q22,13 18,13 Q14,13 12,16Z" fill="#1e40af"/>
    <!-- 目 -->
    <circle cx="16" cy="18" r="0.8" fill="#0c0a09"/>
    <circle cx="20" cy="18" r="0.8" fill="#0c0a09"/>
    <circle cx="16.3" cy="17.7" r="0.3" fill="#fff"/>
    <circle cx="20.3" cy="17.7" r="0.3" fill="#fff"/>
    <!-- 口（微笑） -->
    <path d="M16,21 Q18,22.5 20,21" stroke="#78350f" stroke-width="0.6" fill="none"/>
  </g>

  <!-- 右の双子（赤） -->
  <g>
    <path d="M50,30 L56,58 L42,58 L42,30Z" fill="#991b1b" stroke="#0c0a09" stroke-width="0.6"/>
    <rect x="41" y="46" width="4" height="14" rx="1" fill="#7f1d1d" stroke="#0c0a09" stroke-width="0.4"/>
    <rect x="47" y="46" width="4" height="14" rx="1" fill="#7f1d1d" stroke="#0c0a09" stroke-width="0.4"/>
    <ellipse cx="43" cy="60" rx="3" ry="1.3" fill="#0c0a09"/>
    <ellipse cx="49" cy="60" rx="3" ry="1.3" fill="#0c0a09"/>
    <rect x="39" y="26" width="14" height="22" rx="3" fill="#dc2626" stroke="#0c0a09" stroke-width="0.6"/>
    <path d="M40,32 L52,32" stroke="#7f1d1d" stroke-width="1.5"/>
    <circle cx="46" cy="32" r="1.3" fill="#fde047"/>
    <rect x="34" y="28" width="5" height="14" rx="2" fill="#dc2626" stroke="#0c0a09" stroke-width="0.4"/>
    <rect x="53" y="28" width="5" height="14" rx="2" fill="#dc2626" stroke="#0c0a09" stroke-width="0.4"/>
    <circle cx="55.5" cy="43" r="2" fill="#fde68a" stroke="#0c0a09" stroke-width="0.4"/>
    <ellipse cx="46" cy="18" rx="6" ry="6" fill="#fde68a" stroke="#78350f" stroke-width="0.6"/>
    <path d="M40,16 Q40,8 46,7 Q52,8 52,16 Q50,13 46,13 Q42,13 40,16Z" fill="#991b1b"/>
    <circle cx="44" cy="18" r="0.8" fill="#0c0a09"/>
    <circle cx="48" cy="18" r="0.8" fill="#0c0a09"/>
    <circle cx="44.3" cy="17.7" r="0.3" fill="#fff"/>
    <circle cx="48.3" cy="17.7" r="0.3" fill="#fff"/>
    <path d="M44,21 Q46,22.5 48,21" stroke="#78350f" stroke-width="0.6" fill="none"/>
  </g>

  <!-- 中央で手を繋ぐ -->
  <rect x="26" y="41" width="12" height="4" rx="1.5" fill="#fde68a" stroke="#78350f" stroke-width="0.5"/>
  <circle cx="32" cy="43" r="2.5" fill="#fde047" stroke="#78350f" stroke-width="0.5"/>
  <path d="M32,38 L32,46" stroke="#fbbf24" stroke-width="0.5"/>
</svg>
