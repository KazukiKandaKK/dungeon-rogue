<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ♉ Taurus — 黒牛ミノタウロス全身 -->
  <defs>
    <linearGradient id="ta_body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#44403c"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
  </defs>

  <!-- オーラ -->
  <path d="M32,4 Q14,8 10,24 Q8,44 16,58 Q32,62 48,58 Q56,44 54,24 Q50,8 32,4Z"
        fill="rgba(120,40,180,0.18)" stroke="rgba(180,100,255,0.35)" stroke-width="0.6"/>

  <!-- 尾 -->
  <path d="M46,42 Q56,40 54,52 Q52,50 50,48" fill="none" stroke="#1f1917" stroke-width="1.4"/>
  <circle cx="55" cy="52" r="1.8" fill="#1f1917"/>

  <!-- 胴体 -->
  <ellipse cx="32" cy="42" rx="13" ry="11" fill="url(#ta_body)" stroke="#0c0a09" stroke-width="0.9"/>
  <!-- 筋肉陰影 -->
  <path d="M24,36 Q32,34 40,36" stroke="#57534e" stroke-width="0.6" fill="none" opacity="0.7"/>
  <path d="M26,46 Q32,48 38,46" stroke="#57534e" stroke-width="0.6" fill="none" opacity="0.7"/>

  <!-- 腕（ムキムキ） -->
  <ellipse cx="19" cy="38" rx="4" ry="7" fill="#292524" stroke="#0c0a09" stroke-width="0.7"/>
  <ellipse cx="45" cy="38" rx="4" ry="7" fill="#292524" stroke="#0c0a09" stroke-width="0.7"/>
  <!-- 拳 -->
  <circle cx="19" cy="48" r="3" fill="#1f1917" stroke="#0c0a09" stroke-width="0.6"/>
  <circle cx="45" cy="48" r="3" fill="#1f1917" stroke="#0c0a09" stroke-width="0.6"/>

  <!-- 脚 -->
  <rect x="25" y="50" width="5" height="10" rx="1" fill="#1f1917" stroke="#0c0a09" stroke-width="0.5"/>
  <rect x="34" y="50" width="5" height="10" rx="1" fill="#1f1917" stroke="#0c0a09" stroke-width="0.5"/>
  <!-- 蹄 -->
  <ellipse cx="27.5" cy="61" rx="3.2" ry="1.5" fill="#e7e5e4"/>
  <ellipse cx="36.5" cy="61" rx="3.2" ry="1.5" fill="#e7e5e4"/>

  <!-- 鼻輪の金鎖 -->
  <line x1="32" y1="30" x2="32" y2="24" stroke="#fbbf24" stroke-width="0.6"/>

  <!-- 頭 -->
  <ellipse cx="32" cy="22" rx="11" ry="9" fill="#1f1917" stroke="#0c0a09" stroke-width="0.9"/>
  <!-- 顔の白い毛 -->
  <path d="M26,18 Q32,15 38,18 Q36,22 32,22 Q28,22 26,18Z" fill="#e7e5e4"/>

  <!-- 巨大な角 -->
  <path d="M20,18 Q10,10 4,14 Q12,18 18,22" fill="#e7e5e4" stroke="#78716c" stroke-width="0.7"/>
  <path d="M44,18 Q54,10 60,14 Q52,18 46,22" fill="#e7e5e4" stroke="#78716c" stroke-width="0.7"/>
  <!-- 角先の黒 -->
  <circle cx="5"  cy="14" r="1.5" fill="#0c0a09"/>
  <circle cx="59" cy="14" r="1.5" fill="#0c0a09"/>

  <!-- 鼻面 -->
  <ellipse cx="32" cy="26" rx="5" ry="4" fill="#44403c"/>
  <circle cx="29.5" cy="26" r="0.8" fill="#0c0a09"/>
  <circle cx="34.5" cy="26" r="0.8" fill="#0c0a09"/>

  <!-- 目（赤く光る） -->
  <ellipse cx="27" cy="20" rx="1.6" ry="1.3" fill="#dc2626"/>
  <ellipse cx="37" cy="20" rx="1.6" ry="1.3" fill="#dc2626"/>
  <circle cx="27" cy="20" r="0.5" fill="#fef3c7"/>
  <circle cx="37" cy="20" r="0.5" fill="#fef3c7"/>
  <!-- 怒り眉 -->
  <path d="M23,17 L30,19" stroke="#0c0a09" stroke-width="1"/>
  <path d="M41,17 L34,19" stroke="#0c0a09" stroke-width="1"/>

  <!-- 鼻輪 -->
  <ellipse cx="32" cy="29" rx="2.2" ry="1.4" fill="none" stroke="#fbbf24" stroke-width="1"/>
</svg>
