  <rect x="25" y="19" width="7" height="8" rx="1" fill="#7a7068" stroke="#4a4038" stroke-width="0.8"/>
  <rect x="16" y="29" width="16" height="6" rx="1" fill="#7a7068" stroke="#4a4038" stroke-width="0.8"/>
  <!-- 亀裂 -->
  <path d="M24,16 Q22,22 25,28 Q23,32 24,38" stroke="#4a4038" stroke-width="1" fill="none" opacity="0.7"/>
  <!-- 首 -->
  <rect x="19" y="10" width="10" height="7" rx="2" fill="#8a8078" stroke="#4a4038" stroke-width="1.3"/>
  <!-- 頭 -->
