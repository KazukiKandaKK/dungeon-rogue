  <rect x="33" y="18" width="9" height="16" rx="3" fill="#7a7068" stroke="#4a4038" stroke-width="1.4"/>
  <rect x="33" y="30" width="11" height="8" rx="2" fill="#888078" stroke="#4a4038" stroke-width="1.2"/>
  <!-- 胴体 -->
  <rect x="13" y="16" width="22" height="22" rx="3" fill="#8a8078" stroke="#4a4038" stroke-width="1.6"/>
