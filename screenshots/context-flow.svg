<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 310" width="680" height="310">
  <defs>
    <marker id="ar" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L8,4 L0,7 Z" fill="#6b7280"/>
    </marker>
    <marker id="ar-amber" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L8,4 L0,7 Z" fill="#f59e0b"/>
    </marker>
    <marker id="ar-blue" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L8,4 L0,7 Z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="680" height="310" fill="#0d0d1c"/>

  <!-- step labels (top) -->
  <text x="108" y="20" text-anchor="middle" fill="#4f46e5" font-size="10" font-family="sans-serif">① 状態を保持</text>
  <text x="342" y="20" text-anchor="middle" fill="#7c3aed" font-size="10" font-family="sans-serif">② コンテキスト構築</text>
  <text x="575" y="20" text-anchor="middle" fill="#16a34a" font-size="10" font-family="sans-serif">③ ロジック実行</text>

  <!-- ── Col 1: main.js ── -->
  <rect x="20" y="30" width="176" height="220" rx="6" fill="#131330" stroke="#4f46e5" stroke-width="1.5"/>
  <rect x="20" y="30" width="176" height="26" rx="5" fill="#312e81"/>
  <text x="108" y="48" text-anchor="middle" fill="#c7d2fe" font-size="12" font-family="monospace">main.js</text>

  <circle cx="38" cy="78" r="3.5" fill="#f59e0b"/>
  <text x="48" y="83" fill="#fbbf24" font-size="11" font-family="monospace">turnCount</text>
  <circle cx="38" cy="97" r="3.5" fill="#f59e0b"/>
  <text x="48" y="102" fill="#fbbf24" font-size="11" font-family="monospace">loanDebt</text>
  <circle cx="38" cy="116" r="3.5" fill="#f59e0b"/>
  <text x="48" y="121" fill="#fbbf24" font-size="11" font-family="monospace">shopOpen</text>

  <line x1="34" y1="132" x2="184" y2="132" stroke="#1e293b" stroke-width="1"/>

  <circle cx="38" cy="148" r="3.5" fill="#3b82f6"/>
  <text x="48" y="153" fill="#93c5fd" font-size="11" font-family="monospace">player</text>
  <circle cx="38" cy="167" r="3.5" fill="#3b82f6"/>
  <text x="48" y="172" fill="#93c5fd" font-size="11" font-family="monospace">enemies[ ]</text>
  <circle cx="38" cy="186" r="3.5" fill="#3b82f6"/>
  <text x="48" y="191" fill="#93c5fd" font-size="11" font-family="monospace">floatingTexts[ ]</text>
  <circle cx="38" cy="205" r="3.5" fill="#3b82f6"/>
  <text x="48" y="210" fill="#93c5fd" font-size="11" font-family="monospace">arrows[ ]</text>

  <!-- legend col1 -->
  <circle cx="30" cy="232" r="3" fill="#f59e0b"/>
  <text x="38" y="236" fill="#9ca3af" font-size="9" font-family="sans-serif">プリミティブ</text>
  <circle cx="30" cy="248" r="3" fill="#3b82f6"/>
  <text x="38" y="252" fill="#9ca3af" font-size="9" font-family="sans-serif">オブジェクト/配列</text>

  <!-- ── arrows col1 → col2 ── -->
  <line x1="198" y1="97" x2="232" y2="97" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#ar-amber)"/>
  <text x="215" y="90" text-anchor="middle" fill="#f59e0b" font-size="9" font-family="sans-serif">コピー</text>

  <line x1="198" y1="177" x2="232" y2="177" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ar-blue)"/>
  <text x="215" y="193" text-anchor="middle" fill="#3b82f6" font-size="9" font-family="sans-serif">参照</text>

  <!-- ── Col 2: ctx ── -->
  <rect x="238" y="30" width="208" height="220" rx="6" fill="#16102e" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="238" y="30" width="208" height="26" rx="5" fill="#5b21b6"/>
  <text x="342" y="48" text-anchor="middle" fill="#e9d5ff" font-size="12" font-family="monospace">ctx</text>

  <circle cx="256" cy="78" r="3.5" fill="#f59e0b"/>
  <text x="266" y="83" fill="#fbbf24" font-size="11" font-family="monospace">turnCount</text>
  <circle cx="256" cy="97" r="3.5" fill="#f59e0b"/>
  <text x="266" y="102" fill="#fbbf24" font-size="11" font-family="monospace">loanDebt</text>

  <line x1="252" y1="112" x2="434" y2="112" stroke="#1e293b" stroke-width="1"/>

  <circle cx="256" cy="128" r="3.5" fill="#3b82f6"/>
  <text x="266" y="133" fill="#93c5fd" font-size="11" font-family="monospace">player</text>
  <circle cx="256" cy="147" r="3.5" fill="#3b82f6"/>
  <text x="266" y="152" fill="#93c5fd" font-size="11" font-family="monospace">enemies[ ]</text>

  <line x1="252" y1="163" x2="434" y2="163" stroke="#1e293b" stroke-width="1"/>

  <circle cx="256" cy="179" r="3.5" fill="#10b981"/>
  <text x="266" y="184" fill="#6ee7b7" font-size="11" font-family="monospace">onFlash( )</text>
  <circle cx="256" cy="198" r="3.5" fill="#10b981"/>
  <text x="266" y="203" fill="#6ee7b7" font-size="11" font-family="monospace">onEnemyTurn( )</text>
  <circle cx="256" cy="217" r="3.5" fill="#10b981"/>
  <text x="266" y="222" fill="#6ee7b7" font-size="11" font-family="monospace">attack( )</text>

  <!-- legend col2 -->
  <circle cx="248" cy="244" r="3" fill="#10b981"/>
  <text x="256" y="248" fill="#9ca3af" font-size="9" font-family="sans-serif">コールバック</text>

  <!-- ── arrow col2 → col3 ── -->
  <line x1="448" y1="140" x2="482" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="465" y="133" text-anchor="middle" fill="#6b7280" font-size="9" font-family="sans-serif">渡す</text>

  <!-- ── Col 3: TypeScript ── -->
  <rect x="488" y="30" width="172" height="220" rx="6" fill="#0b1f10" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="488" y="30" width="172" height="26" rx="5" fill="#14532d"/>
  <text x="574" y="48" text-anchor="middle" fill="#bbf7d0" font-size="12" font-family="monospace">TypeScript</text>

  <text x="504" y="76" fill="#4ade80" font-size="11" font-family="monospace">processTurn(ctx)</text>
  <line x1="500" y1="86" x2="648" y2="86" stroke="#1e293b" stroke-width="1"/>

  <circle cx="504" cy="105" r="3.5" fill="#f59e0b"/>
  <text x="514" y="110" fill="#fbbf24" font-size="10" font-family="monospace">ctx.turnCount++</text>

  <circle cx="504" cy="128" r="3.5" fill="#3b82f6"/>
  <text x="514" y="133" fill="#93c5fd" font-size="10" font-family="monospace">ctx.enemies.push(e)</text>
  <text x="514" y="148" fill="#374151" font-size="9" font-family="monospace">// in-place 変更</text>

  <circle cx="504" cy="167" r="3.5" fill="#10b981"/>
  <text x="514" y="172" fill="#6ee7b7" font-size="10" font-family="monospace">ctx.onFlash(color)</text>

  <circle cx="504" cy="188" r="3.5" fill="#10b981"/>
  <text x="514" y="193" fill="#6ee7b7" font-size="10" font-family="monospace">ctx.onEnemyTurn(e)</text>
  <text x="514" y="208" fill="#374151" font-size="9" font-family="monospace">// 敵ターン起動</text>

  <!-- ── sync-back arrow (bottom) ── -->
  <path d="M574 258 Q342 282 108 258" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#ar-amber)"/>
  <text x="342" y="298" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="sans-serif">④ _syncPACtx() ― プリミティブのみ書き戻す</text>
</svg>
