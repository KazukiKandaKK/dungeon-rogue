<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="640" height="300">
  <defs>
    <marker id="ar" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L8,4 L0,7 Z" fill="#6b7280"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L8,4 L0,7 Z" fill="#10b981"/>
    </marker>
    <marker id="ar-violet" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L8,4 L0,7 Z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="640" height="300" fill="#0d0d1c"/>

  <!-- ── main.js (wiring layer) ── -->
  <rect x="60" y="20" width="520" height="96" rx="6" fill="#131330" stroke="#4f46e5" stroke-width="1.5"/>
  <rect x="60" y="20" width="520" height="26" rx="5" fill="#312e81"/>
  <text x="320" y="38" text-anchor="middle" fill="#c7d2fe" font-size="12" font-family="monospace">main.js  ― 配線層</text>

  <text x="82" y="64" fill="#9ca3af" font-size="11" font-family="monospace">onEnemyTurn:</text>
  <text x="82" y="64" fill="#6b7280" font-size="11" font-family="monospace">              e =&gt;</text>
  <text x="240" y="64" fill="#10b981" font-size="11" font-family="monospace">doEnemyTurn(e, _makeEnemyAICtx())</text>

  <text x="82" y="84" fill="#9ca3af" font-size="11" font-family="monospace">onProcessDeathTraits:</text>
  <text x="82" y="84" fill="#6b7280" font-size="11" font-family="monospace">                     d =&gt;</text>
  <text x="350" y="84" fill="#10b981" font-size="11" font-family="monospace">processEnemyDeathTraits(d, ...)</text>

  <!-- ── arrow: main.js → player-actions ── -->
  <line x1="200" y1="118" x2="200" y2="154" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ar-violet)"/>
  <text x="168" y="140" fill="#8b5cf6" font-size="9" font-family="sans-serif">ctx を渡す</text>

  <!-- ── player-actions.ts ── -->
  <rect x="40" y="160" width="220" height="116" rx="6" fill="#16102e" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="40" y="160" width="220" height="26" rx="5" fill="#5b21b6"/>
  <text x="150" y="178" text-anchor="middle" fill="#e9d5ff" font-size="12" font-family="monospace">player-actions.ts</text>

  <text x="58" y="204" fill="#a78bfa" font-size="11" font-family="monospace">processTurn()</text>
  <line x1="54" y1="213" x2="248" y2="213" stroke="#1e293b" stroke-width="1"/>
  <text x="58" y="230" fill="#6b7280" font-size="10" font-family="monospace">ctx.onEnemyTurn(e)</text>
  <text x="58" y="248" fill="#6b7280" font-size="10" font-family="monospace">ctx.onProcessDeathTraits(d)</text>
  <text x="58" y="266" fill="#374151" font-size="9" font-family="monospace">// enemy-ai を import しない</text>

  <!-- ── no-import indicator between the two boxes ── -->
  <line x1="300" y1="218" x2="360" y2="218" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="330" y="208" text-anchor="middle" fill="#ef4444" font-size="10" font-family="sans-serif">import</text>
  <!-- X mark -->
  <line x1="316" y1="223" x2="344" y2="211" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="316" y1="211" x2="344" y2="223" stroke="#ef4444" stroke-width="1.5"/>

  <!-- ── enemy-ai.ts ── -->
  <rect x="380" y="160" width="220" height="116" rx="6" fill="#0b1f10" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="380" y="160" width="220" height="26" rx="5" fill="#14532d"/>
  <text x="490" y="178" text-anchor="middle" fill="#bbf7d0" font-size="12" font-family="monospace">enemy-ai.ts</text>

  <text x="398" y="204" fill="#4ade80" font-size="11" font-family="monospace">doEnemyTurn()</text>
  <line x1="394" y1="213" x2="588" y2="213" stroke="#1e293b" stroke-width="1"/>
  <text x="398" y="230" fill="#6b7280" font-size="10" font-family="monospace">ステータス異常処理</text>
  <text x="398" y="248" fill="#6b7280" font-size="10" font-family="monospace">takeTurn() 呼び出し</text>
  <text x="398" y="266" fill="#6b7280" font-size="10" font-family="monospace">攻撃・魔法・範囲の解決</text>

  <!-- ── callback arrow: player-actions → enemy-ai (via callback) ── -->
  <path d="M260 218 Q320 148 380 218" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#ar-green)"/>
  <text x="320" y="138" text-anchor="middle" fill="#10b981" font-size="9" font-family="sans-serif">callback 経由</text>
</svg>
